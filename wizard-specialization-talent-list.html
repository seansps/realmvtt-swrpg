<script>
  // Wizard-specific version of specialization-talent-list
  // The "chosen" button is visible by default and handles XP tracking for the wizard

  function toggleChosen(value) {
    toggleChosenWizardTalent(value);
  }

  function toggleChosenWizardTalent(value) {
    const talents = record.data?.wizard?.talents || [];
    const dataPathToTalent = dataPath.replace("data.chosen", "");
    const talent = api.getValue(dataPathToTalent);

    const rankedTalent = talent?.data?.ranked === "yes" ? true : false;

    const talentIdToUse = rankedTalent
      ? talent._id
      : `${talent._id}-${dataPathToTalent}`;

    // If it is ranked, check if it already exists in the talents list
    const existingTalent = talents.find((t) => t._id === talentIdToUse);
    const existingTalentIndex = talents.findIndex(
      (t) => t._id === talentIdToUse
    );

    if (value === "yes") {
      // Add talent to talents list and add cost to spent xp
      if (existingTalentIndex !== -1) {
        // Update the rank
        api.setValues(
          {
            [`data.wizard.talents.${existingTalentIndex}.data.rank`]:
              (existingTalent?.data?.rank || 0) + 1,
          },
          (recordUpdated) => {
            updateWizardXp(recordUpdated, talent.data?.cost || 0);
          }
        );
      } else {
        // Add it to the talents list
        const newTalents = [
          ...talents,
          {
            ...talent,
            _id: talentIdToUse,
            data: {
              ...talent.data,
              rank: 1,
            },
            icon: "IconStar",
          },
        ];
        api.setValues(
          {
            [`data.wizard.talents`]: newTalents,
          },
          (recordUpdated) => {
            updateWizardXp(recordUpdated, talent.data?.cost || 0);
          }
        );
      }
    } else {
      // Remove talent from talents list and subtract cost from spent xp
      if (
        existingTalentIndex !== -1 &&
        existingTalent?.data?.rank &&
        existingTalent?.data?.rank > 1
      ) {
        // We are deducting a rank
        api.setValues(
          {
            [`data.wizard.talents.${existingTalentIndex}.data.rank`]:
              existingTalent?.data?.rank - 1,
          },
          (recordUpdated) => {
            updateWizardXp(recordUpdated, -(talent.data?.cost || 0));
          }
        );
      } else if (existingTalentIndex !== -1) {
        // We are removing the talent
        api.removeValue(
          "data.wizard.talents",
          existingTalentIndex,
          (recordUpdated) => {
            // Requery the record on remove value
            api.getRecord(record.recordType, record._id, (recordUpdated2) => {
              updateWizardXp(recordUpdated2, -(talent.data?.cost || 0));
            });
          }
        );
      }
    }
  }

  function updateWizardXp(currentRecord, xpChange) {
    // Update the wizard XP tracking
    const startingXp = currentRecord.data?.wizard?.startingXp || 0;
    // F&D uses moralityBonusXp, others use bonusXp
    const gameType = currentRecord.data?.wizard?.gameType;
    const bonusXp =
      gameType === "fad"
        ? currentRecord.data?.wizard?.moralityBonusXp || 0
        : currentRecord.data?.wizard?.bonusXp || 0;
    const charXpSpent = currentRecord.data?.wizard?.charXpSpent || 0;
    const skillXpSpent = currentRecord.data?.wizard?.skillXpSpent || 0;
    const currentTalentXpSpent = currentRecord.data?.wizard?.talentXpSpent || 0;

    const newTalentXpSpent = currentTalentXpSpent + xpChange;
    const totalXp = startingXp + bonusXp;
    const totalSpent = charXpSpent + skillXpSpent + newTalentXpSpent;
    const xpRemaining = totalXp - totalSpent;

    api.setValues({
      "data.wizard.xpRemaining": xpRemaining,
      "data.wizard.xpSpent": totalSpent,
      "data.wizard.talentXpSpent": newTalentXpSpent,
    });
  }
</script>
