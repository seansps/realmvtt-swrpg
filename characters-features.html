<script>
  function onDrop(type, recordLink) {
    if (type === "specializations") {
      onDropSpecialization(type, recordLink);
    } else if (type === "force_powers") {
      onDropForcePower(type, recordLink);
    } else if (type === "talents") {
      onDropTalent(type, recordLink);
    }
  }

  function onDropSpecialization(type, recordLink) {
    const specializationName = recordLink.tooltip;
    // Pre-set visibility + initialized so the canvas tree mounts correctly the
    // first time the user opens this spec — otherwise the spec-main onLoad has
    // to do a setValues round-trip to flip canvasTreeBox.hidden, and the
    // canvas mounts a frame too late to catch its initial size measurement.
    const specializationObj = {
      ...recordLink.value,
      icon: "IconStars",
      fields: {
        ...(recordLink.value?.fields || {}),
        canvasTreeBox: { hidden: false },
        editorTreeBox: { hidden: true },
        signatureAbility: { hidden: false },
      },
      data: {
        ...(recordLink.value?.data || {}),
        initalized: true,
        // Stash the character's id so canvas-handler context (which sees the
        // spec entry as `record`, not the character) can patch back to us.
        characterId: record._id,
      },
    };

    api.addValue("data.specializations", specializationObj, () => {
      const valuesToSet = {};

      // Add force rating from specialization if applicable
      const specForceRating = specializationObj?.data?.forceRating || 0;
      if (specForceRating > 0) {
        const newForceRating =
          specForceRating + (record?.data?.forceRating || 0);
        const committedForce = parseInt(
          record?.data?.committedForce || "0",
          10,
        );
        valuesToSet["data.forceRating"] = newForceRating;
        valuesToSet["data.totalForceRating"] = newForceRating;
        valuesToSet["data.remainingForce"] = Math.max(
          0,
          newForceRating - committedForce,
        );
      }

      // Mark all career skills
      const careerSkills = specializationObj?.data?.skills || "";
      const careerSkillsArray = careerSkills.toLowerCase().split(",");
      // Filter empty strings and trim whitespace
      const careerSkillsArrayFiltered = careerSkillsArray
        .filter((skill) => skill.trim() !== "")
        .map((skill) => skill.trim());
      const skills = record?.data?.skills || [];
      skills.forEach((skill, index) => {
        if (
          careerSkillsArrayFiltered.includes(skill.name.toLowerCase().trim())
        ) {
          valuesToSet[`data.skills.${index}.data.careerOrMinionSkill`] = true;
        }
      });

      if (Object.keys(valuesToSet).length > 0) {
        api.setValues(valuesToSet);
      }
    });
  }

  function onDropForcePower(type, recordLink) {
    const forcePowerName = recordLink.tooltip;
    // Pre-set visibility/init/characterId so the canvas tree mounts in player
    // mode the first time the user opens this force power. Same pattern as
    // spec/sig-ability drops.
    const forcePowerObj = {
      ...recordLink.value,
      icon: "IconWand",
      fields: {
        ...(recordLink.value?.fields || {}),
        editorTreeBox: { hidden: true },
        canvasTreeBox: { hidden: false },
      },
      data: {
        ...(recordLink.value?.data || {}),
        initalized: true,
        characterId: record._id,
      },
    };

    api.addValue("data.forcePowers", forcePowerObj, () => {
      const valuesToSet = {};

      // Add cost to spent xp
      valuesToSet[`data.spentXp`] =
        (record?.data?.spentXp || 0) + (forcePowerObj?.data?.cost || 0);

      api.setValues(valuesToSet);
    });
  }

  function onDropTalent(type, recordLink) {
    const talent = recordLink?.value;
    if (!talent) return;

    const rankedTalent = talent?.data?.ranked === "yes" ? true : false;

    const talents = record?.data?.talents || [];

    const talentIdToUse = rankedTalent
      ? talent._id
      : `${talent._id}-${generateUuid()}`;

    // If it is ranked, check if it already exists in the talents list
    const existingTalent = talents.find((t) => t._id === talentIdToUse);
    const existingTalentIndex = talents.findIndex(
      (t) => t._id === talentIdToUse,
    );

    // Add talent to talents list and add cost to spent xp
    if (existingTalentIndex !== -1) {
      // Update the rank
      api.setValues(
        {
          [`data.talents.${existingTalentIndex}.data.rank`]:
            (existingTalent?.data?.rank || 0) + 1,
        },
        (recordUpdated) => {
          const valuesToSet = {
            [`data.spentXp`]:
              (talent.data?.cost || 0) + (recordUpdated.data.spentXp || 0),
          };
          updateAttributes(recordUpdated, valuesToSet);
          api.setValues(valuesToSet);
        },
      );
    } else {
      // Add it to the talents list
      const newTalents = [
        ...talents,
        {
          ...talent,
          _id: talentIdToUse,
          data: {
            ...talent.data,
            rank: 1,
          },
          icon: "IconStar",
        },
      ];
      api.setValues(
        {
          [`data.talents`]: newTalents,
        },
        (recordUpdated) => {
          const valuesToSet = {
            [`data.spentXp`]:
              (talent.data?.cost || 0) + (recordUpdated.data.spentXp || 0),
          };
          updateAttributes(recordUpdated, valuesToSet);
          api.setValues(valuesToSet);
        },
      );
    }
  }
</script>

<div
  class="sheet--datapad sheet--datapad--swrpg"
  style="display: flex; flex-direction: column; gap: 8px; margin-top: 4px"
>
  <!-- ===== SPECIALIZATIONS ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Specializations</span>
    </div>
    <div style="display: flex; justify-content: center">
      <label
        class="rvtt-datapad-label"
        label="Click a Specialization's Icon to View the Tree and Add Talents"
      ></label>
    </div>
    <list
      listtype="character_specialization_list"
      field="specializations"
      variant="striped"
    ></list>
  </div>

  <!-- ===== TALENTS ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Talents</span>
    </div>
    <list
      listtype="character_talents_list"
      field="talents"
      variant="striped"
    ></list>
  </div>

  <!-- ===== SPECIES FEATURES ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Species Features</span>
    </div>
    <list listtype="character_species_details_list" field="species"></list>
    <div style="display: flex; justify-content: center">
      <label
        class="rvtt-datapad-label"
        field="speciesDetailsLabel"
        label="Drag and Drop a Species on the Main Tab"
      ></label>
    </div>
  </div>

  <!-- ===== FORCE POWERS ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Force Powers</span>
    </div>
    <list
      listtype="character_force_powers_list"
      field="forcePowers"
      variant="striped"
    ></list>
  </div>
</div>
