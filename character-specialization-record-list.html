<div style="display: flex; flex-direction: column; gap: 4px">
  <div
    style="display: flex; flex-direction: row; gap: 4px; align-items: center"
  >
    <div style="width: 42px; height: 42px; min-height: 42px; min-width: 42px">
      <portrait width="42px" height="42px" field="portrait"></portrait>
    </div>
    <namefield
      field="name"
      size="md"
      width="100%"
      variant="unstyled"
      bold="true"
      placeholder="Specialization Name..."
    ></namefield>
  </div>
  <label
    field="signatureAbilityLabel"
    size="sm"
    variant="bold"
    textalign="center"
    label="Signature Ability"
  ></label>
  <list
    field="signatureAbility"
    listtype="character_signature_ability_list"
    variant="striped"
  ></list>
</div>
