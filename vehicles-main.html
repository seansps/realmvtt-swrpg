<script>
  function onDrop(type, recordLink, sourceInfo) {
    if (type === "conditions") {
      onDropCondition(type, recordLink);
    } else if (type === "items") {
      onDropItem(recordLink);
      if (sourceInfo) {
        if (sourceInfo?.type === "list") {
          api.getRecord(
            sourceInfo.recordType,
            sourceInfo.recordId,
            (sourceRecord) => {
              api.removeValueFromRecord(
                sourceRecord,
                sourceInfo.dataPath,
                sourceInfo.index,
              );
            },
          );
        } else if (sourceInfo?.type === "partysheet") {
          api.removePartySheetItem(sourceInfo.itemId);
        }
      }
    }
  }

  function onDropCondition(type, recordLink) {
    api.getRecord(record.recordType, record._id, (actualRecord) => {
      addConditionToRecord(actualRecord, recordLink);
    });
  }

  function onDropItem(recordLink) {
    const item = recordLink?.value;
    const isConsumable = item?.data?.consumable || false;
    const hasUseBtn = item?.data?.hasUseBtn || false;

    const recordDataPath = getNearestParentDataPath(dataPath);
    const thisRecord = api.getValue(recordDataPath) || record;

    let unitCount = item.data?.count || 1;
    const itemToAdd = {
      ...item,
      icon: "IconBox",
      data: {
        ...item?.data,
        fromId: item._id,
        count: unitCount,
      },
      fields: {
        ...item?.fields,
        useBtn: {
          hidden: !isConsumable && !hasUseBtn,
        },
      },
    };

    const items = thisRecord?.data?.inventory || [];
    const index = items.findIndex((i) => i.data?.fromId === item._id);

    let existingItem = index !== -1 ? items[index] : undefined;
    if (existingItem) {
      const count = parseFloat(existingItem.data?.count || "0");
      let unitCount = parseFloat(item.data?.count || "1");
      api.setValue(
        `${recordDataPath ? `${recordDataPath}.` : ""}data.inventory.${index}.data.count`,
        count + unitCount,
      );
    } else {
      api.addValue(
        `${recordDataPath ? `${recordDataPath}.` : ""}data.inventory`,
        itemToAdd,
      );
    }
  }

  function showHideFields() {
    const vehicleDataPath = getNearestParentDataPath(dataPath);
    const vehicle = api.getValue(vehicleDataPath) || record;
    const prefix = vehicleDataPath ? `${vehicleDataPath}.` : "";
    const fieldsToSet = {};

    // Show hardpoints section (always visible on a vehicle record)
    if (vehicle.fields?.vehicleHardpointsField?.hidden !== false) {
      fieldsToSet[`${prefix}fields.vehicleHardpointsField.hidden`] = false;
    }

    // Show hardpoints counter only when hardpoints > 0
    if (
      vehicle.fields?.vehicleHardpoints?.hidden !== false &&
      vehicle.data?.hardpoints &&
      vehicle.data?.hardpoints > 0
    ) {
      fieldsToSet[`${prefix}fields.vehicleHardpoints.hidden`] = false;
    } else if (
      vehicle.fields?.vehicleHardpoints?.hidden !== true &&
      (!vehicle.data?.hardpoints || vehicle.data?.hardpoints === 0)
    ) {
      fieldsToSet[`${prefix}fields.vehicleHardpoints.hidden`] = true;
    }

    if (Object.keys(fieldsToSet).length > 0) {
      api.setValues(fieldsToSet);
    }
  }

  function onRollCriticalInjury() {
    const vehicleDataPath = getNearestParentDataPath(dataPath);
    const thisRecord = api.getValue(vehicleDataPath) || record;
    rollCriticalInjury(thisRecord, "hit", []);
  }

  function onChangeConditions() {
    const deletedItem = data.deletedItem;
    if (!deletedItem) return;
    const vehicleDataPath = getNearestParentDataPath(dataPath);
    const thisRecord = api.getValue(vehicleDataPath) || record;
    onConditionChange(thisRecord, deletedItem);
  }

  function onChangeWounds() {
    const vehicleDataPath = getNearestParentDataPath(dataPath);
    const prefix = vehicleDataPath ? `${vehicleDataPath}.` : "";
    const wounds = api.getValue(`${prefix}data.wounds`);
    const woundThreshold = api.getValue(`${prefix}data.woundThreshold`);
    const woundsRemaining = Math.max(woundThreshold - wounds, 0);
    api.setValue(`${prefix}data.woundsRemaining`, woundsRemaining);
  }

  function onChangeStrain() {
    const vehicleDataPath = getNearestParentDataPath(dataPath);
    const prefix = vehicleDataPath ? `${vehicleDataPath}.` : "";
    const strain = api.getValue(`${prefix}data.strain`);
    const strainThreshold = api.getValue(`${prefix}data.strainThreshold`);
    const strainRemaining = Math.max(strainThreshold - strain, 0);
    api.setValue(`${prefix}data.strainRemaining`, strainRemaining);
  }
</script>
