  // Wizard-specific specialization tree view
  // This is a simplified version of specialization-main.html for use in the character wizard
  // It displays the talent tree and allows purchasing talents with XP tracking
  // Uses wizard_specialization_talent_list which has the purchase button visible by default

  function onWizardTreeLoad() {
    // Initialize the talent tree display
    showHideDividers();
  }

  function showHideDividers() {
    const nearestParentDataPath = getNearestParentDataPath(dataPath);
    const specialization = api.getValue(nearestParentDataPath) || record;
    const valuesToSet = {};

    const dividersToCheck = [
      "connector2_1", "connector2_2", "connector2_3", "connector2_4",
      "h_connector1_2", "h_connector1_3", "h_connector1_4",
      "connector3_1", "connector3_2", "connector3_3", "connector3_4",
      "h_connector2_2", "h_connector2_3", "h_connector2_4",
      "connector4_1", "connector4_2", "connector4_3", "connector4_4",
      "h_connector3_2", "h_connector3_3", "h_connector3_4",
      "connector5_1", "connector5_2", "connector5_3", "connector5_4",
      "h_connector4_2", "h_connector4_3", "h_connector4_4",
      "h_connector5_2", "h_connector5_3", "h_connector5_4",
    ];

    dividersToCheck.forEach((divider) => {
      if (specialization?.data?.[divider] === "Yes") {
        valuesToSet[`${nearestParentDataPath}.fields.${divider}_divider.hidden`] = false;
      } else {
        valuesToSet[`${nearestParentDataPath}.fields.${divider}_divider.hidden`] = true;
      }
    });

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
