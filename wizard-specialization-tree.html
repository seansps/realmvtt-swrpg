<script>
  // Wizard-specific specialization tree view (canvas only).
  // Renders the same 5×4 spec tree visualization as specialization-main.html's
  // canvas branch, but persists chosen upgrades to record.data.wizard.talents
  // (NOT record.data.talents) and tracks XP through updateWizardXp instead of
  // mutating record.data.spentXp directly. record IS the character throughout
  // the wizard, so no characterId stash / api.getRecord lookup needed.

  function onWizardTreeLoad() {
    paintWizardTree();
  }

  function getSpecForCanvas() {
    const path = getNearestParentDataPath(dataPath);
    return { spec: api.getValue(path) || record, specPath: path };
  }

  function ttLayout() {
    const c = api.getCanvas("wizardTreeCanvas");
    if (!c) return null;
    const W = c.width;
    const H = c.height;
    const PAD = 10;
    const HGAP = 18;
    const VGAP = 14;
    const tileW = Math.floor((W - 2 * PAD - 3 * HGAP) / 4);
    const tileH = Math.floor((H - 2 * PAD - 4 * VGAP) / 5);
    return {
      W: W,
      H: H,
      PAD: PAD,
      HGAP: HGAP,
      VGAP: VGAP,
      tileW: tileW,
      tileH: tileH,
    };
  }

  function ttTileRect(row, col, lay) {
    const x = lay.PAD + (col - 1) * (lay.tileW + lay.HGAP);
    const y = lay.PAD + (row - 1) * (lay.tileH + lay.VGAP);
    return { x: x, y: y, w: lay.tileW, h: lay.tileH };
  }

  function ttCheckboxRect(row, col, lay) {
    const t = ttTileRect(row, col, lay);
    const sz = 20;
    return { x: t.x + t.w - sz - 5, y: t.y + 5, w: sz, h: sz };
  }

  function ttChosenIdFor(talent, slotPathDot) {
    if (!talent) return null;
    const ranked = talent?.data?.ranked === "yes";
    return ranked ? talent._id : `${talent._id}-${slotPathDot}`;
  }

  // Per-slot chosen state (mirrors specialization-main.html). Source of truth
  // for the checkbox — critical for ranked talents that can fill multiple
  // slots, where only the slots actually clicked should toggle on.
  function ttIsSlotChosen(spec, row, col) {
    const slot = spec?.data?.[`talent${row}_${col}`]?.[0];
    return slot?.data?.chosen === "yes";
  }

  function ttChosenRank(talent, charRec) {
    if (!talent || talent?.data?.ranked !== "yes") return 0;
    const list = charRec?.data?.wizard?.talents || [];
    const found = list.find((t) => t._id === talent._id);
    return found?.data?.rank || 0;
  }

  function ttStripHtml(s) {
    return (s || "")
      .replace(/<[^>]*>/g, " ")
      .replace(/&nbsp;/g, " ")
      .replace(/&amp;/g, "&")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/\s+/g, " ");
  }

  function ttTruncate(c, text, maxW) {
    if (!text) return "";
    if (c.measureText(text).width <= maxW) return text;
    let lo = 0;
    let hi = text.length;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (c.measureText(text.slice(0, mid) + "…").width <= maxW) lo = mid;
      else hi = mid;
    }
    return text.slice(0, lo) + "…";
  }

  function ttWrapText(c, text, maxW, maxLines) {
    const words = (text || "").split(" ");
    const lines = [];
    let line = "";
    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      const test = line ? line + " " + w : w;
      if (c.measureText(test).width > maxW && line) {
        lines.push(line);
        line = w;
        if (lines.length >= maxLines) break;
      } else {
        line = test;
      }
    }
    if (line && lines.length < maxLines) lines.push(line);
    if (lines.length >= maxLines) {
      lines[maxLines - 1] = ttTruncate(c, lines[maxLines - 1] + "…", maxW);
    }
    return lines;
  }

  function ttHitTest(x, y, lay) {
    for (let row = 1; row <= 5; row++) {
      for (let col = 1; col <= 4; col++) {
        const cb = ttCheckboxRect(row, col, lay);
        if (x >= cb.x && x <= cb.x + cb.w && y >= cb.y && y <= cb.y + cb.h) {
          return { row: row, col: col, region: "checkbox" };
        }
        const t = ttTileRect(row, col, lay);
        if (x >= t.x && x <= t.x + t.w && y >= t.y && y <= t.y + t.h) {
          return { row: row, col: col, region: "tile" };
        }
      }
    }
    return null;
  }

  // ---------- Narrative dice rich-text rendering ----------
  function ttSymbolMap() {
    return {
      ability: {
        char: "d",
        font: "EotE Symbol",
        fill: "#46ac4e",
        stroke: "#000000",
      },
      difficulty: {
        char: "d",
        font: "EotE Symbol",
        fill: "#52287e",
        stroke: "#000000",
      },
      proficiency: {
        char: "c",
        font: "EotE Symbol",
        fill: "#fef035",
        stroke: "#000000",
      },
      challenge: {
        char: "c",
        font: "EotE Symbol",
        fill: "#751317",
        stroke: "#000000",
      },
      boost: {
        char: "b",
        font: "EotE Symbol",
        fill: "#76cddb",
        stroke: "#000000",
      },
      setback: {
        char: "b",
        font: "EotE Symbol",
        fill: "#000000",
        stroke: "#888888",
      },
      magic: {
        char: "c",
        font: "EotE Symbol",
        fill: "#ffffff",
        stroke: "#000000",
      },
      force: {
        char: "c",
        font: "EotE Symbol",
        fill: "#ffffff",
        stroke: "#000000",
      },
      success: { char: "s", font: "EotE Symbol", fill: null },
      advantage: { char: "a", font: "EotE Symbol", fill: null },
      failure: { char: "f", font: "EotE Symbol", fill: null },
      threat: { char: "t", font: "EotE Symbol", fill: null },
      triumph: { char: "x", font: "EotE Symbol", fill: null },
      despair: { char: "y", font: "EotE Symbol", fill: null },
      light: { char: "Z", font: "EotE Symbol", fill: null },
      dark: { char: "z", font: "EotE Symbol", fill: null },
      forcepoint: { char: "Y", font: "EotE Symbol", fill: null },
    };
  }

  function ttParseRichText(html) {
    if (!html) return [];
    const out = [];
    const spanRe =
      /<span[^>]*data-dice-type=["']([^"']+)["'][^>]*>[\s\S]*?<\/span>/gi;
    let last = 0;
    let m;
    while ((m = spanRe.exec(html)) !== null) {
      if (m.index > last) {
        const txt = ttStripHtml(html.slice(last, m.index));
        if (txt) out.push({ type: "text", text: txt });
      }
      out.push({ type: "symbol", kind: m[1].toLowerCase() });
      last = m.index + m[0].length;
    }
    if (last < html.length) {
      const txt = ttStripHtml(html.slice(last));
      if (txt) out.push({ type: "text", text: txt });
    }
    return out;
  }

  function ttRenderRichText(
    c,
    tokens,
    x,
    y,
    maxW,
    lineH,
    maxLines,
    color,
    basePxFont,
    dry,
  ) {
    const sym = ttSymbolMap();
    const px = parseInt(basePxFont, 10) || 12;
    const symFontStr = (def) => px + "px '" + def.font + "'";
    const items = [];
    for (let i = 0; i < tokens.length; i++) {
      const t = tokens[i];
      if (t.type === "text") {
        const parts = t.text.split(/(\s+)/);
        for (let j = 0; j < parts.length; j++) {
          const p = parts[j];
          if (!p) continue;
          if (/^\s+$/.test(p)) items.push({ kind: "space" });
          else items.push({ kind: "word", text: p });
        }
      } else if (t.type === "symbol") {
        items.push({ kind: "symbol", which: t.kind });
      }
    }
    let curX = x;
    let curY = y;
    let line = 1;
    let firstOnLine = true;
    c.setTextAlign("left");
    c.setTextBaseline("top");
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      let itW = 0;
      if (it.kind === "word") {
        c.setFont(basePxFont);
        itW = c.measureText(it.text).width;
      } else if (it.kind === "space") {
        c.setFont(basePxFont);
        itW = c.measureText(" ").width;
      } else if (it.kind === "symbol") {
        const def = sym[it.which];
        if (!def) continue;
        c.setFont(symFontStr(def));
        itW = c.measureText(def.char).width + 2;
      }
      if (it.kind === "space" && firstOnLine) continue;
      if (curX + itW > x + maxW && !firstOnLine) {
        curX = x;
        curY += lineH;
        line++;
        if (line > maxLines) return maxLines;
        firstOnLine = true;
        if (it.kind === "space") continue;
      }
      if (!dry) {
        if (it.kind === "word") {
          c.setFont(basePxFont);
          c.setFillStyle(color);
          c.fillText(it.text, curX, curY);
        } else if (it.kind === "symbol") {
          const def = sym[it.which];
          if (def) {
            c.setFont(symFontStr(def));
            if (def.stroke) {
              c.setStrokeStyle(def.stroke);
              c.setLineWidth(1.5);
              c.strokeText(def.char, curX + 1, curY);
            }
            c.setFillStyle(def.fill || color);
            c.fillText(def.char, curX + 1, curY);
          }
        }
      }
      curX += itW;
      firstOnLine = false;
    }
    return line;
  }

  function ttTheme() {
    return {
      bg: api.getThemeColor("background"),
      surface: api.getThemeColor("surface"),
      border: api.getThemeColor("border"),
      primary: api.getThemeColor("primary"),
      primaryLight: api.getThemeColor("primaryLight"),
      primaryContrast: api.getThemeColor("primaryContrast"),
      text: api.getThemeColor("text"),
      textDim: api.getThemeColor("textDim"),
    };
  }

  function ttDrawConnectors(c, spec, lay, theme) {
    c.setStrokeStyle(theme.primary);
    c.setLineWidth(3);
    c.setLineCap("round");

    for (let row = 2; row <= 5; row++) {
      for (let col = 1; col <= 4; col++) {
        const key = `connector${row}_${col}`;
        if (spec.data?.[key] !== "Yes") continue;
        const top = ttTileRect(row - 1, col, lay);
        const bot = ttTileRect(row, col, lay);
        const x = top.x + top.w / 2;
        c.beginPath();
        c.moveTo(x, top.y + top.h);
        c.lineTo(x, bot.y);
        c.stroke();
      }
    }

    for (let row = 1; row <= 5; row++) {
      for (let col = 2; col <= 4; col++) {
        const key = `h_connector${row}_${col}`;
        if (spec.data?.[key] !== "Yes") continue;
        const left = ttTileRect(row, col - 1, lay);
        const right = ttTileRect(row, col, lay);
        const y = left.y + left.h / 2;
        c.beginPath();
        c.moveTo(left.x + left.w, y);
        c.lineTo(right.x, y);
        c.stroke();
      }
    }
  }

  function ttDrawTile(c, row, col, talent, chosen, rank, lay, theme) {
    const t = ttTileRect(row, col, lay);

    if (chosen) {
      c.setFillStyle(theme.primary);
      c.fillRect(t.x, t.y, t.w, t.h);
    } else if (talent) {
      c.setFillStyle(theme.surface);
      c.fillRect(t.x, t.y, t.w, t.h);
    }

    if (chosen) {
      c.setStrokeStyle(theme.primary);
      c.setLineWidth(1);
    } else {
      c.setStrokeStyle(theme.border);
      c.setLineWidth(1);
    }
    c.strokeRect(t.x + 0.5, t.y + 0.5, t.w - 1, t.h - 1);

    if (!talent) {
      c.setFillStyle(theme.textDim);
      c.setFont("11px sans-serif");
      c.setTextAlign("center");
      c.setTextBaseline("middle");
      c.fillText("(empty)", t.x + t.w / 2, t.y + t.h / 2);
      return;
    }

    const textColor = chosen ? theme.primaryContrast : theme.text;
    const dimColor = chosen ? theme.primaryContrast : theme.textDim;

    const pSize = 26;
    const pX = t.x + 6;
    const pY = t.y + 6;
    if (talent.portrait) {
      c.drawImage(talent.portrait, pX, pY, pSize, pSize);
    } else {
      c.setFillStyle(chosen ? theme.primaryContrast : theme.border);
      c.beginPath();
      c.arc(pX + pSize / 2, pY + pSize / 2, pSize / 2, 0, Math.PI * 2);
      c.fill();
      c.setFillStyle(chosen ? theme.primary : theme.text);
      c.setFont("bold 13px sans-serif");
      c.setTextAlign("center");
      c.setTextBaseline("middle");
      c.fillText(
        (talent.name || "?").charAt(0).toUpperCase(),
        pX + pSize / 2,
        pY + pSize / 2 + 1,
      );
    }

    const headerX = pX + pSize + 8;
    const headerRight = t.x + t.w - 30;

    c.setFillStyle(textColor);
    c.setFont("bold 13px sans-serif");
    c.setTextAlign("left");
    c.setTextBaseline("top");
    c.fillText(
      ttTruncate(c, talent.name || "Unnamed", headerRight - headerX),
      headerX,
      t.y + 7,
    );

    const activation = talent.data?.activation || "Passive";
    const cost = talent.data?.cost != null ? talent.data.cost : "";
    const ranked = talent.data?.ranked === "yes";
    const sub = `${activation}${cost !== "" ? " · " + cost + " XP" : ""}${ranked ? " · Ranked" : ""}`;
    c.setFillStyle(dimColor);
    c.setFont("11px sans-serif");
    c.fillText(ttTruncate(c, sub, headerRight - headerX), headerX, t.y + 24);

    const tokens = ttParseRichText(talent.data?.description || "");
    if (tokens.length) {
      ttRenderRichText(
        c,
        tokens,
        t.x + 8,
        t.y + 42,
        t.w - 16,
        14,
        2,
        dimColor,
        "11px sans-serif",
        false,
      );
    }

    if (chosen && ranked && rank > 1) {
      c.setFillStyle(theme.primaryContrast);
      c.setFont("bold 11px sans-serif");
      c.setTextAlign("right");
      c.setTextBaseline("top");
      c.fillText("×" + rank, t.x + t.w - 32, t.y + 8);
    }

    const cb = ttCheckboxRect(row, col, lay);
    if (chosen) {
      c.setFillStyle(theme.primaryContrast);
      c.fillRect(cb.x, cb.y, cb.w, cb.h);
    }
    c.setStrokeStyle(chosen ? theme.primary : theme.border);
    c.setLineWidth(1);
    c.strokeRect(cb.x + 0.5, cb.y + 0.5, cb.w - 1, cb.h - 1);
    if (chosen) {
      c.setStrokeStyle(theme.primary);
      c.setLineWidth(2);
      c.setLineCap("round");
      c.beginPath();
      c.moveTo(cb.x + 4, cb.y + 11);
      c.lineTo(cb.x + 9, cb.y + 15);
      c.lineTo(cb.x + 16, cb.y + 5);
      c.stroke();
    }
  }

  function ttDrawTooltip(c, talent, hoveredTile, lay, theme) {
    const tipW = Math.min(360, lay.W - 20);
    const padX = 10;
    const padY = 8;
    const lineH = 16;
    const headerH = 18;
    const subH = 15;

    const tokens = ttParseRichText(talent.data?.description || "");
    const descMaxW = tipW - padX * 2;
    const MAX_DESC_LINES = 14;
    const descLineCount = tokens.length
      ? ttRenderRichText(
          c,
          tokens,
          0,
          0,
          descMaxW,
          lineH,
          MAX_DESC_LINES,
          "#000",
          "12px sans-serif",
          true,
        )
      : 0;
    const tipH = padY * 2 + headerH + subH + descLineCount * lineH;

    let tipX = hoveredTile.x;
    let tipY = hoveredTile.y + hoveredTile.h + 6;
    if (tipY + tipH > lay.H - 4) tipY = hoveredTile.y - tipH - 6;
    if (tipY < 4) tipY = 4;
    if (tipX + tipW > lay.W - 4) tipX = lay.W - tipW - 4;
    if (tipX < 4) tipX = 4;

    c.setShadowColor("rgba(0, 0, 0, 0.45)");
    c.setShadowBlur(12);
    c.setShadowOffsetX(0);
    c.setShadowOffsetY(2);
    c.setFillStyle(theme.surface);
    c.fillRect(tipX, tipY, tipW, tipH);
    c.setShadowBlur(0);
    c.setShadowOffsetY(0);

    c.setStrokeStyle(theme.primary);
    c.setLineWidth(1);
    c.strokeRect(tipX + 0.5, tipY + 0.5, tipW - 1, tipH - 1);

    let ty = tipY + padY;
    c.setTextAlign("left");
    c.setTextBaseline("top");

    c.setFillStyle(theme.text);
    c.setFont("bold 13px sans-serif");
    c.fillText(
      ttTruncate(c, talent.name || "Unnamed", tipW - padX * 2),
      tipX + padX,
      ty,
    );
    ty += headerH;

    const activation = talent.data?.activation || "Passive";
    const cost = talent.data?.cost != null ? talent.data.cost : "";
    const ranked = talent.data?.ranked === "yes" ? " · Ranked" : "";
    const sub = `${activation}${cost !== "" ? " · " + cost + " XP" : ""}${ranked}`;
    c.setFillStyle(theme.textDim);
    c.setFont("italic 11px sans-serif");
    c.fillText(sub, tipX + padX, ty);
    ty += subH;

    if (tokens.length) {
      ttRenderRichText(
        c,
        tokens,
        tipX + padX,
        ty,
        descMaxW,
        lineH,
        MAX_DESC_LINES,
        theme.text,
        "12px sans-serif",
        false,
      );
    }
  }

  function paintWizardTree(explicitCharRec) {
    const c = api.getCanvas("wizardTreeCanvas");
    if (!c) return;
    const lay = ttLayout();
    if (!lay || lay.tileW <= 0 || lay.tileH <= 0) return;

    const ctx = getSpecForCanvas();
    const spec = ctx.spec;
    if (!spec) return;

    // Resolve the character record. In paint context (called from portrait's
    // onload), `record` IS the character. In canvas event handler context,
    // `record` is the spec entry — fall back to characterId stashed on the
    // spec, fetching the character explicitly so chosen states reflect the
    // character's data.wizard.talents (not stale data on the spec entry).
    let charRec = explicitCharRec;
    if (!charRec) {
      if (record?.recordType === "characters") {
        charRec = record;
      } else if (spec.data?.characterId) {
        api.getRecord("characters", spec.data.characterId, (cr) => {
          if (cr) {
            ttPreloadPortraitsThen(spec, () =>
              doPaintWizardTree(c, lay, ctx, cr),
            );
          }
        });
        return;
      } else {
        // No character resolvable — bail rather than clobber correct render.
        return;
      }
    }
    ttPreloadPortraitsThen(spec, () =>
      doPaintWizardTree(c, lay, ctx, charRec),
    );
  }

  // Preload tile portraits via api.preloadImage so c.drawImage is sync
  // (otherwise async portraits overlay the tooltip).
  function ttPreloadPortraitsThen(spec, then) {
    if (typeof api.preloadImage !== "function") {
      then();
      return;
    }
    const urls = [];
    const seen = new Set();
    for (let r = 1; r <= 5; r++) {
      for (let col = 1; col <= 4; col++) {
        const u = spec?.data?.[`talent${r}_${col}`]?.[0]?.portrait;
        if (u && !seen.has(u)) {
          seen.add(u);
          urls.push(u);
        }
      }
    }
    if (!urls.length) {
      then();
      return;
    }
    Promise.all(urls.map((u) => api.preloadImage(u))).then(then, then);
  }

  function doPaintWizardTree(c, lay, ctx, charRec) {
    const theme = ttTheme();
    const spec = ctx.spec;
    const specPath = ctx.specPath;

    // Backfill characterId so canvas handlers (where `record` = spec entry)
    // can fetch the character to write to it.
    if (
      charRec?.recordType === "characters" &&
      charRec._id &&
      spec.data?.characterId !== charRec._id
    ) {
      api.setValues({
        [`${specPath ? specPath + "." : ""}data.characterId`]: charRec._id,
      });
    }

    // Legacy migration — derive slot.data.chosen from data.wizard.talents
    // for upgrades chosen before per-slot tracking landed.
    migrateLegacyWizardChosenSlots(spec, specPath, charRec);

    c.clearRect(0, 0, lay.W, lay.H);
    ttDrawConnectors(c, spec, lay, theme);

    for (let row = 1; row <= 5; row++) {
      for (let col = 1; col <= 4; col++) {
        const slotKey = `talent${row}_${col}`;
        const talent = spec.data?.[slotKey]?.[0] || null;
        const chosen = !!talent && ttIsSlotChosen(spec, row, col);
        const rank = chosen ? ttChosenRank(talent, charRec) : 0;
        ttDrawTile(c, row, col, talent, chosen, rank, lay, theme);
      }
    }

    // Tooltip drawn last; portraits preloaded so c.drawImage is sync and the
    // tooltip naturally lands on top.
    const hover = api.getSession("wizardSpecHover");
    if (hover) {
      const talent = spec.data?.[`talent${hover.row}_${hover.col}`]?.[0];
      if (talent && (talent.name || talent.data?.description)) {
        ttDrawTooltip(
          c,
          talent,
          ttTileRect(hover.row, hover.col, lay),
          lay,
          theme,
        );
      }
    }
  }

  // Idempotent legacy migration. See specialization-main.html for the full
  // rationale. Wizard talents live on charRec.data.wizard.talents (NOT
  // data.talents), but the slot.data.chosen flag still lives on the spec
  // entry which is staged on the character at data.wizard.specializations[N].
  // Since we use api.setValuesOnRecord(charRec, …) the slot path includes
  // the wizard.specializations.N prefix — same pattern works.
  function migrateLegacyWizardChosenSlots(spec, specPath, charRec) {
    if (spec?.data?.legacyChosenMigrated) return;
    const prefix = specPath ? specPath + "." : "";
    const talents = charRec?.data?.wizard?.talents || [];
    const updates = {};
    let touched = false;

    const slotsByTalentId = {};
    for (let r = 1; r <= 5; r++) {
      for (let col = 1; col <= 4; col++) {
        const t = spec.data?.[`talent${r}_${col}`]?.[0];
        if (!t?._id) continue;
        if (!slotsByTalentId[t._id]) slotsByTalentId[t._id] = [];
        slotsByTalentId[t._id].push({ row: r, col: col });
      }
    }

    for (const entry of talents) {
      if (!entry?._id) continue;
      const dashIdx = entry._id.indexOf("-");
      const isUnrankedEncoded =
        dashIdx > 0 && entry._id.slice(dashIdx + 1).includes("data.");
      if (isUnrankedEncoded) {
        const slotPathDot = entry._id.slice(dashIdx + 1);
        const m = slotPathDot.match(/data\.(talent\d+_\d+)\.0\.?$/);
        if (m && slotPathDot.startsWith(prefix + "data.")) {
          const slotKey = m[1];
          const slot = spec.data?.[slotKey]?.[0];
          if (slot && slot.data?.chosen !== "yes") {
            updates[`${prefix}data.${slotKey}.0.data.chosen`] = "yes";
            touched = true;
          }
        }
      } else {
        const occurrences = slotsByTalentId[entry._id] || [];
        const rank = entry?.data?.rank || 1;
        for (let i = 0; i < Math.min(rank, occurrences.length); i++) {
          const { row, col } = occurrences[i];
          const slot = spec.data?.[`talent${row}_${col}`]?.[0];
          if (slot && slot.data?.chosen !== "yes") {
            updates[`${prefix}data.talent${row}_${col}.0.data.chosen`] = "yes";
            touched = true;
          }
        }
      }
    }

    updates[`${prefix}data.legacyChosenMigrated`] = true;
    if (touched) {
      api.setValuesOnRecord(charRec, updates, (recUpd) =>
        paintWizardTree(recUpd),
      );
    } else {
      api.setValuesOnRecord(charRec, {
        [`${prefix}data.legacyChosenMigrated`]: true,
      });
    }
  }

  function onCanvasMove() {
    const lay = ttLayout();
    if (!lay) return;
    const hit = ttHitTest(event.x, event.y, lay);
    const prev = api.getSession("wizardSpecHover");
    const same =
      (!prev && !hit) ||
      (prev && hit && prev.row === hit.row && prev.col === hit.col);
    if (!same) {
      api.setSession("wizardSpecHover", hit);
      paintWizardTree();
    }
  }

  function onCanvasLeave() {
    if (api.getSession("wizardSpecHover")) {
      api.setSession("wizardSpecHover", null);
      paintWizardTree();
    }
  }

  function onCanvasClick() {
    const lay = ttLayout();
    if (!lay) return;
    const hit = ttHitTest(event.x, event.y, lay);
    if (!hit) return;

    const ctx = getSpecForCanvas();
    const spec = ctx.spec;
    const specPath = ctx.specPath;
    const slotKey = `talent${hit.row}_${hit.col}`;
    const talent = spec.data?.[slotKey]?.[0];
    if (!talent) return;

    if (hit.region === "checkbox") {
      // Resolve character: in canvas event handler context, `record` is the
      // spec entry, not the character. Use stashed characterId to fetch the
      // character so toggle writes hit data.wizard.talents on the character.
      withCharacter(spec, (charRec) => {
        // Per-slot chosen state — for ranked talents, only the slots actually
        // clicked should toggle off (talent._id alone matches every slot).
        const isChosen = ttIsSlotChosen(spec, hit.row, hit.col);
        ttToggleChosen(charRec, hit.row, hit.col, isChosen ? "no" : "yes");
      });
    } else if (hit.region === "tile") {
      if (talent._id && talent.recordType) {
        api.openRecord(talent.recordType, talent._id);
      }
    }
  }

  function withCharacter(spec, cb) {
    if (record?.recordType === "characters") {
      cb(record);
    } else if (spec?.data?.characterId) {
      api.getRecord("characters", spec.data.characterId, (cr) => {
        if (cr) cb(cr);
      });
    }
  }

  // Wizard-specific toggle: chosen upgrades persist to character's
  // data.wizard.talents (NOT data.talents). Per-slot data.chosen on the spec
  // entry is the visual source of truth — required so ranked talents that
  // fill multiple slots only mark the slots actually clicked. Writes go via
  // setValuesOnRecord because `record` in canvas event context is the spec
  // entry, not the character.
  function ttToggleChosen(charRec, row, col, newValue) {
    const ctx = getSpecForCanvas();
    const spec = ctx.spec;
    const specPath = ctx.specPath;
    const slotKey = `talent${row}_${col}`;
    const talent = spec.data?.[slotKey]?.[0];
    if (!talent) return;

    const slotPathPrefix = specPath ? specPath + "." : "";
    const slotPathDot = `${slotPathPrefix}data.${slotKey}.0.`;
    const slotChosenPath = `${slotPathPrefix}data.${slotKey}.0.data.chosen`;
    const ranked = talent.data?.ranked === "yes";
    const id = ranked ? talent._id : `${talent._id}-${slotPathDot}`;

    const talents = charRec.data?.wizard?.talents || [];
    const idx = talents.findIndex((t) => t._id === id);
    const existing = talents[idx];
    const cost = talent.data?.cost || 0;

    if (newValue === "yes") {
      if (idx !== -1) {
        api.setValuesOnRecord(
          charRec,
          {
            [slotChosenPath]: "yes",
            [`data.wizard.talents.${idx}.data.rank`]:
              (existing?.data?.rank || 0) + 1,
          },
          (recUpd) => {
            updateWizardXp(recUpd, cost);
            paintWizardTree(recUpd);
          },
        );
      } else {
        const newTalents = [
          ...talents,
          {
            ...talent,
            _id: id,
            data: { ...talent.data, rank: 1 },
            icon: "IconStar",
          },
        ];
        api.setValuesOnRecord(
          charRec,
          {
            [slotChosenPath]: "yes",
            "data.wizard.talents": newTalents,
          },
          (recUpd) => {
            updateWizardXp(recUpd, cost);
            paintWizardTree(recUpd);
          },
        );
      }
    } else {
      if (idx !== -1 && existing?.data?.rank && existing.data.rank > 1) {
        api.setValuesOnRecord(
          charRec,
          {
            [slotChosenPath]: "no",
            [`data.wizard.talents.${idx}.data.rank`]: existing.data.rank - 1,
          },
          (recUpd) => {
            updateWizardXp(recUpd, -cost);
            paintWizardTree(recUpd);
          },
        );
      } else if (idx !== -1) {
        const filtered = talents.filter((_, i) => i !== idx);
        api.setValuesOnRecord(
          charRec,
          {
            [slotChosenPath]: "no",
            "data.wizard.talents": filtered,
          },
          (recUpd) => {
            updateWizardXp(recUpd, -cost);
            paintWizardTree(recUpd);
          },
        );
      } else {
        api.setValuesOnRecord(
          charRec,
          { [slotChosenPath]: "no" },
          (recUpd) => paintWizardTree(recUpd),
        );
      }
    }
  }

  // Mirrors wizard-specialization-talent-list.html's updateWizardXp. F&D
  // uses moralityBonusXp for total XP; other game types use bonusXp.
  // Writes via setValuesOnRecord so XP lands on the character (not the spec
  // entry that `record` resolves to in canvas event context).
  function updateWizardXp(currentRecord, xpChange) {
    const startingXp = currentRecord.data?.wizard?.startingXp || 0;
    const gameType = currentRecord.data?.wizard?.gameType;
    const bonusXp =
      gameType === "fad"
        ? currentRecord.data?.wizard?.moralityBonusXp || 0
        : currentRecord.data?.wizard?.bonusXp || 0;
    const charXpSpent = currentRecord.data?.wizard?.charXpSpent || 0;
    const skillXpSpent = currentRecord.data?.wizard?.skillXpSpent || 0;
    const currentTalentXpSpent = currentRecord.data?.wizard?.talentXpSpent || 0;

    const newTalentXpSpent = currentTalentXpSpent + xpChange;
    const totalXp = startingXp + bonusXp;
    const totalSpent = charXpSpent + skillXpSpent + newTalentXpSpent;
    const xpRemaining = totalXp - totalSpent;

    api.setValuesOnRecord(currentRecord, {
      "data.wizard.xpRemaining": xpRemaining,
      "data.wizard.xpSpent": totalSpent,
      "data.wizard.talentXpSpent": newTalentXpSpent,
    });
  }
</script>

<div style="display: flex; gap: 4px; flex-direction: column; width: 100%">
  <!-- Header: small portrait + name. Portrait hosts onload to trigger paint. -->
  <div style="display: flex; gap: 4px; width: 100%; align-items: center">
    <div style="width: 40px; height: 40px; min-height: 40px; min-width: 40px">
      <portrait
        width="40px"
        height="40px"
        field="portrait"
        onload="onWizardTreeLoad()"
      ></portrait>
    </div>
    <label field="name" size="md" variant="bold"></label>
  </div>

  <!-- Canvas: 5×4 spec tree, no editor mode (wizard never authors). -->
  <div style="width: 100%; height: 480px">
    <canvas
      field="wizardTreeCanvas"
      autosize="true"
      style="
        width: 100%;
        height: 100%;
        display: block;
        cursor: pointer;
        border-radius: 4px;
      "
      onresize="paintWizardTree()"
      onmousemove="onCanvasMove()"
      onmouseleave="onCanvasLeave()"
      onclick="onCanvasClick()"
    ></canvas>
  </div>
</div>
