<script>
  // Step 3: Obligation/Duty/Morality
  // Based on game type (EotE/AoR/F&D), the player selects their:
  // - Obligation type and value (Edge of the Empire)
  // - Duty type and value (Age of Rebellion)
  // - Morality (Force and Destiny)
  // Players can take extra obligation/duty for bonus XP or credits

  function onStepEnd(stepIndex) {
    const gameType = record.data?.wizard?.gameType;

    if (!gameType) {
      api.showNotification(
        "Please select a game type before continuing.",
        "yellow",
        "Game Type Required"
      );
      return false;
    }

    if (gameType === "eote") {
      const obligationType = record.data?.wizard?.obligationType;
      if (!obligationType) {
        api.showNotification(
          "Please select an obligation type before continuing.",
          "yellow",
          "Obligation Required"
        );
        return false;
      }
    } else if (gameType === "aor") {
      const dutyType = record.data?.wizard?.dutyType;
      if (!dutyType) {
        api.showNotification(
          "Please select a duty type before continuing.",
          "yellow",
          "Duty Required"
        );
        return false;
      }
    } else if (gameType === "fad") {
      const moralityStrength = record.data?.wizard?.moralityStrength;
      const moralityWeakness = record.data?.wizard?.moralityWeakness;
      if (!moralityStrength || !moralityWeakness) {
        api.showNotification(
          "Please select both a strength and weakness for your morality.",
          "yellow",
          "Morality Required"
        );
        return false;
      }
    }

    return true;
  }

  function getBaseObligationDuty() {
    const setting = api.getSetting("startingObligationDuty");
    return parseInt(setting, 10) || 10;
  }

  function onStep3Load() {
    // Set initial obligation/duty values from campaign setting
    const baseObDuty = getBaseObligationDuty();
    api.setValues({
      "data.wizard.baseObligationDuty": baseObDuty,
      "data.wizard.totalObligation": baseObDuty,
      "data.wizard.startingDuty": baseObDuty,
      "data.wizard.startingMorality": 50,
    });

    // Check existing game type and show appropriate section
    const gameType = record.data?.wizard?.gameType;
    if (gameType) {
      showGameTypeSection(gameType);
    }
  }

  function onGameTypeChange(value) {
    api.setValues(
      {
        "data.wizard.gameType": value,
      },
      () => {
        showGameTypeSection(value);
      }
    );
  }

  function showGameTypeSection(gameType) {
    const valuesToSet = {
      "fields.eoteSection.hidden": gameType !== "eote",
      "fields.aorSection.hidden": gameType !== "aor",
      "fields.fadSection.hidden": gameType !== "fad",
    };
    api.setValues(valuesToSet);
  }

  function onBonusChange(value) {
    // Calculate bonus XP and credits based on selection
    let bonusXp = 0;
    let bonusCredits = 0;
    let extraObligation = 0;

    if (value === "xp5") {
      bonusXp = 5;
      extraObligation = 5;
    } else if (value === "xp10") {
      bonusXp = 10;
      extraObligation = 10;
    } else if (value === "credits5") {
      bonusCredits = 1000;
      extraObligation = 5;
    } else if (value === "credits10") {
      bonusCredits = 2500;
      extraObligation = 10;
    }

    // Update the wizard data
    const startingXp = record.data?.wizard?.startingXp || 0;
    const baseObDuty =
      record.data?.wizard?.baseObligationDuty || getBaseObligationDuty();

    api.setValues({
      "data.wizard.bonusChoice": value,
      "data.wizard.bonusXp": bonusXp,
      "data.wizard.bonusCredits": bonusCredits,
      "data.wizard.extraObligation": extraObligation,
      "data.wizard.totalObligation": baseObDuty + extraObligation,
      "data.wizard.startingDuty": baseObDuty - extraObligation, // Duty decreases with bonuses
      "data.wizard.xpRemaining": startingXp + bonusXp,
    });
  }

  function onObligationDescriptionChange(value) {
    api.setValues({
      "data.wizard.obligationDescription": value,
    });
  }

  function onDutyDescriptionChange(value) {
    api.setValues({
      "data.wizard.dutyDescription": value,
    });
  }

  function onMoralityBonusChange(value) {
    // Morality bonuses require choosing Light Side (71) or Dark Side (29)
    // You cannot take a bonus and remain at 50
    let bonusXp = 0;
    let bonusCredits = 0;
    let startingMorality = 50;

    if (value === "light_xp10") {
      bonusXp = 10;
      startingMorality = 71;
    } else if (value === "dark_xp10") {
      bonusXp = 10;
      startingMorality = 29;
    } else if (value === "light_credits2500") {
      bonusCredits = 2500;
      startingMorality = 71;
    } else if (value === "dark_credits2500") {
      bonusCredits = 2500;
      startingMorality = 29;
    } else if (value === "light_xp5credits1000") {
      bonusXp = 5;
      bonusCredits = 1000;
      startingMorality = 71;
    } else if (value === "dark_xp5credits1000") {
      bonusXp = 5;
      bonusCredits = 1000;
      startingMorality = 29;
    }
    // value === "none" keeps defaults (0 XP, 0 credits, morality 50)

    const startingXp = record.data?.wizard?.startingXp || 0;

    api.setValues({
      "data.wizard.moralityBonusChoice": value,
      "data.wizard.moralityBonusXp": bonusXp,
      "data.wizard.moralityBonusCredits": bonusCredits,
      "data.wizard.startingMorality": startingMorality,
      "data.wizard.xpRemaining": startingXp + bonusXp,
    });
  }
</script>
