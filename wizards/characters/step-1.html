<script>
  // Step 1: Species Selection
  // The player selects their species which determines:
  // - Starting characteristics (Brawn, Agility, Intellect, Cunning, Willpower, Presence)
  // - Starting XP
  // - Wound Threshold base (+ Brawn)
  // - Strain Threshold base (+ Willpower)
  // - Special abilities and free skill ranks

  function onStepEnd(stepIndex) {
    // Validate that a species has been selected
    const speciesId = record.data?.wizard?.selectedSpeciesId;
    if (!speciesId) {
      api.showNotification(
        "Please select a species before continuing.",
        "yellow",
        "Species Required"
      );
      return false;
    }
    return true;
  }

  function onSpeciesSelected(value) {
    if (!value) {
      // Species was cleared
      onDeleteSpecies();
      return;
    }

    let speciesId = "";
    try {
      const speciesObject = JSON.parse(value);
      speciesId = speciesObject._id;
    } catch (e) {
      api.showNotification("Invalid species selection.", "red", "Error");
      return;
    }

    // value is the _id of the selected species record
    // We need to look up the full record
    api.getRecord("species", speciesId, (speciesRecord) => {
      if (!speciesRecord) {
        api.showNotification("Could not find species record.", "red", "Error");
        return;
      }

      const speciesObj = { ...speciesRecord, icon: "IconAlien" };
      const speciesName = speciesRecord.name;

      // Calculate derived values
      const brawn = speciesRecord?.data?.brawn || 2;
      const willpower = speciesRecord?.data?.willpower || 2;
      const woundBase = speciesRecord?.data?.woundThreshold || 10;
      const strainBase = speciesRecord?.data?.strainThreshold || 10;

      const valuesToSet = {
        "data.wizard.selectedSpecies": [speciesObj],
        "data.wizard.selectedSpeciesId": value,
        "data.wizard.speciesName": speciesName,
        "data.wizard.brawn": brawn,
        "data.wizard.agility": speciesRecord?.data?.agility || 2,
        "data.wizard.intellect": speciesRecord?.data?.intellect || 2,
        "data.wizard.cunning": speciesRecord?.data?.cunning || 2,
        "data.wizard.willpower": willpower,
        "data.wizard.presence": speciesRecord?.data?.presence || 2,
        "data.wizard.startingXp": speciesRecord?.data?.startingXp || 100,
        "data.wizard.xpRemaining": speciesRecord?.data?.startingXp || 100,
        "data.wizard.xpSpent": 0,
        "data.wizard.woundThresholdBase": woundBase,
        "data.wizard.strainThresholdBase": strainBase,
        "data.wizard.woundThreshold": woundBase + brawn,
        "data.wizard.strainThreshold": strainBase + willpower,
        "data.wizard.features": speciesRecord?.data?.features || "",
        "fields.speciesDetails.hidden": false,
      };

      api.setValues(valuesToSet);
    });
  }

  function onDeleteSpecies() {
    const valuesToSet = {
      "data.wizard.selectedSpecies": [],
      "data.wizard.selectedSpeciesId": null,
      "data.wizard.speciesName": "",
      "data.wizard.brawn": 2,
      "data.wizard.agility": 2,
      "data.wizard.intellect": 2,
      "data.wizard.cunning": 2,
      "data.wizard.willpower": 2,
      "data.wizard.presence": 2,
      "data.wizard.startingXp": 0,
      "data.wizard.xpRemaining": 0,
      "data.wizard.woundThresholdBase": 10,
      "data.wizard.strainThresholdBase": 10,
      "data.wizard.woundThreshold": 12,
      "data.wizard.strainThreshold": 12,
      "data.wizard.startingSkills": "",
      "fields.speciesDetails.hidden": true,
    };

    api.setValues(valuesToSet);
  }

  function onStep1Load() {
    // Check if species already selected (returning to step)
    const speciesId = record.data?.wizard?.selectedSpeciesId;
    if (speciesId) {
      api.setHidden("speciesDetails", false);
    }
  }
</script>
