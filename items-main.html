<script>
  function showHideValues(typeStr) {
    const nearestParentDataPath = getNearestParentDataPath(dataPath);
    const item = api.getValue(nearestParentDataPath) || record;

    // If this is an nested item, just return. (Like a weapon attachment)
    let pathToFields = "fields";
    if (nearestParentDataPath !== "") {
      pathToFields = `${nearestParentDataPath}.fields`;
    }
    let pathToData = "data";
    if (nearestParentDataPath !== "") {
      pathToData = `${nearestParentDataPath}.data`;
    }

    const valuesToSet = {
      [`${pathToFields}.weaponProperties.hidden`]: true,
      [`${pathToFields}.packProperties.hidden`]: true,
      [`${pathToFields}.rangedWeaponProperties.hidden`]: true,
      [`${pathToFields}.weaponType.hidden`]: true,
      [`${pathToFields}.ammoType.hidden`]: true,
      [`${pathToFields}.magazine.hidden`]: true,
      [`${pathToFields}.weaponAttachmentProperties.hidden`]: true,
      [`${pathToFields}.armorAttachmentProperties.hidden`]: true,
      [`${pathToFields}.hardpoints.hidden`]: true,
      [`${pathToFields}.armorProperties.hidden`]: true,
      [`${pathToFields}.weaponAttachedLabel.hidden`]: true,
      [`${pathToFields}.weaponAttached.hidden`]: true,
      [`${pathToFields}.drugProperties.hidden`]: true,
      [`${pathToFields}.consumableProperties.hidden`]:
        item?.data?.consumable || item?.data?.hasUseBtn ? false : true,
      [`${pathToFields}.animationProps.hidden`]: true,
      // The below fields are only displayed on the attack list
      [`${pathToFields}.generalWeaponProperties.hidden`]: true,
      [`${pathToFields}.attackDividerBox.hidden`]: false,
      [`${pathToFields}.autoFireBtn.hidden`]: true,
      [`${pathToFields}.stunBtn.hidden`]: true,
    };

    if (typeStr === "armor") {
      valuesToSet[`${pathToFields}.consumable.hidden`] = true;
      valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = false;
      valuesToSet[`${pathToFields}.hardpoints.hidden`] = false;
      valuesToSet[`${pathToFields}.armorProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.curheadSp.hidden`] = true;
      valuesToSet[`${pathToFields}.curbodySp.hidden`] = true;
      valuesToSet[`${pathToFields}.curshieldSp.hidden`] = true;
    } else if (typeStr === "drug") {
      valuesToSet[`${pathToFields}.drugProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.consumable.hidden`] = true;
      valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = true;
      valuesToSet[`${pathToFields}.consumableProperties.hidden`] = false;
    } else if (typeStr === "general") {
      valuesToSet[`${pathToFields}.consumable.hidden`] = false;
      valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = false;
    } else if (typeStr === "melee weapon") {
      valuesToSet[`${pathToFields}.consumable.hidden`] = true;
      valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = false;
      valuesToSet[`${pathToFields}.weaponProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.weaponType.hidden`] = false;
      valuesToSet[`${pathToFields}.weaponAttachmentsProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.hardpoints.hidden`] = false;
      valuesToSet[`${pathToFields}.generalWeaponProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.animationProps.hidden`] = false;
      // Defaults for melee weapons
      valuesToSet[`${pathToData}.weaponSkill`] = "Brawling";
      valuesToSet[`${pathToData}.rof`] = "1";
      valuesToSet[`${pathToData}.handsRequired`] = "1";
      valuesToSet[`${pathToData}.quality`] = "average";
      valuesToSet[`${pathToData}.exotic`] = "false";
      valuesToSet[`${pathToData}.concealable`] = "false";
    } else if (typeStr === "ranged weapon") {
      valuesToSet[`${pathToFields}.consumable.hidden`] = true;
      valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = false;
      valuesToSet[`${pathToFields}.weaponProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.rangedWeaponProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.ammoType.hidden`] = false;
      valuesToSet[`${pathToFields}.magazine.hidden`] = false;
      valuesToSet[`${pathToFields}.dvProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.weaponAttachmentsProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.hardpoints.hidden`] = false;
      valuesToSet[`${pathToFields}.generalWeaponProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.attackByRangeBtn.hidden`] = false;
      valuesToSet[`${pathToFields}.reloadBtn.hidden`] = false;
      valuesToSet[`${pathToFields}.ammo.hidden`] = false;
      valuesToSet[`${pathToFields}.ammoCount.hidden`] = false;
      valuesToSet[`${pathToFields}.animationProps.hidden`] = false;
      // Defaults for ranged weapons
      valuesToSet[`${pathToData}.weaponSkill`] = "Archery";
      valuesToSet[`${pathToData}.rof`] = "1";
      valuesToSet[`${pathToData}.handsRequired`] = "1";
      valuesToSet[`${pathToData}.quality`] = "average";
      valuesToSet[`${pathToData}.exotic`] = "false";
      valuesToSet[`${pathToData}.concealable`] = "false";
    } else if (typeStr === "pack") {
      valuesToSet[`${pathToFields}.consumable.hidden`] = true;
      valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = true;
      valuesToSet[`${pathToFields}.packProperties.hidden`] = false;
    } else if (typeStr === "weapon attachment") {
      valuesToSet[`${pathToFields}.consumable.hidden`] = true;
      valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = false;
      valuesToSet[`${pathToFields}.weaponAttachmentProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.slots.hidden`] = false;
    } else if (typeStr === "armor attachment") {
      valuesToSet[`${pathToFields}.consumable.hidden`] = true;
      valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = false;
      valuesToSet[`${pathToFields}.armorAttachmentProperties.hidden`] = false;
      valuesToSet[`${pathToFields}.slots.hidden`] = false;
    } else {
      valuesToSet[`${pathToFields}.consumable.hidden`] = true;
      valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = true;
    }

    api.setValues(valuesToSet);
  }

  function isAttachment(value) {
    const isWeapon =
      value.data?.type === "ranged weapon" ||
      value.data?.type === "melee weapon";
    const isArmor = record?.data?.type === "armor";

    if (isWeapon) {
      return value.data?.type === "weapon attachment";
    } else if (isArmor) {
      return value.data?.type === "armor attachment";
    }

    return false;
  }

  function isWeapon(value) {
    return (
      value.data?.type === "ranged weapon" ||
      value.data?.type === "melee weapon"
    );
  }

  function onHardpointsChange(value) {
    const nearestParentDataPath = getNearestParentDataPath(dataPath);
    const item = api.getValue(nearestParentDataPath) || record;
    const itemType = item?.data?.type;

    if (
      (itemType === "armor" ||
        itemType === "ranged weapon" ||
        itemType === "melee weapon") &&
      value > 0
    ) {
      api.setHidden("attachmentsProperties", false);
    } else if (value < 1) {
      api.setHidden("attachmentsProperties", true);
    }
  }

  function onAttachmentTypeChange(value) {
    // Rebuild the attachment data path incase this is a nested item
    let attachmentDataPath = dataPath.replace(/data.attachmentType[.]?/, "");
    const valuesToSet = {
      [`${attachmentDataPath}fields.dvProperties.hidden`]: true,
      [`${attachmentDataPath}fields.afDvProperties.hidden`]: true,
      [`${attachmentDataPath}fields.magazineSize.hidden`]: true,
      [`${attachmentDataPath}fields.weaponAttached.hidden`]: true,
      [`${attachmentDataPath}fields.weaponAttachedLabel.hidden`]: true,
    };

    if (value === "altRange") {
      valuesToSet[`${attachmentDataPath}fields.dvProperties.hidden`] = false;
      valuesToSet[`${attachmentDataPath}fields.afDvProperties.hidden`] = false;
    } else if (value === "magazine") {
      valuesToSet[`${attachmentDataPath}fields.magazineSize.hidden`] = false;
    } else if (value === "weapon") {
      valuesToSet[`${attachmentDataPath}fields.weaponAttached.hidden`] = false;
      valuesToSet[
        `${attachmentDataPath}fields.weaponAttachedLabel.hidden`
      ] = false;
    }

    api.setValues(valuesToSet);
  }

  function showHideUseValues(value) {
    const nearestParentDataPath = getNearestParentDataPath(dataPath);

    // If this is an nested item, just return. (Like a weapon attachment)
    let pathToFields = "fields";
    if (nearestParentDataPath !== "") {
      pathToFields = `${nearestParentDataPath}.fields`;
    }

    const valuesToSet = {};

    if (value) {
      valuesToSet[`${pathToFields}.consumableProperties.hidden`] = false;
    } else if (!record.data?.consumable) {
      valuesToSet[`${pathToFields}.consumableProperties.hidden`] = true;
    }

    api.setValues(valuesToSet);
  }

  function showHideConsumableValues(value) {
    const nearestParentDataPath = getNearestParentDataPath(dataPath);

    // If this is an nested item, just return. (Like a weapon attachment)
    let pathToFields = "fields";
    if (nearestParentDataPath !== "") {
      pathToFields = `${nearestParentDataPath}.fields`;
    }

    const valuesToSet = {};

    if (value) {
      valuesToSet[`${pathToFields}.consumableProperties.hidden`] = false;
    } else if (!record.data?.hasUseBtn) {
      valuesToSet[`${pathToFields}.consumableProperties.hidden`] = true;
    }

    api.setValues(valuesToSet);
  }

  function getWeaponSkillOptions() {
    const nearestParentDataPath = getNearestParentDataPath(dataPath);
    const item = api.getValue(nearestParentDataPath) || record;
    const itemType = item?.data?.type;
    if (itemType === "melee weapon") {
      return [
        { label: "Brawling", value: "Brawling" },
        { label: "Martial Arts", value: "Martial Arts" },
        { label: "Melee Weapon", value: "Melee Weapon" },
      ];
    }
    return [
      { label: "Archery", value: "Archery" },
      { label: "Autofire", value: "Autofire" },
      { label: "Handgun", value: "Handgun" },
      { label: "Heavy Weapons", value: "Heavy Weapons" },
      { label: "Shoulder Arms", value: "Shoulder Arms" },
      { label: "Pilot Sea Vehicle", value: "Pilot Sea Vehicle" },
      { label: "Pilot Air Vehicle", value: "Pilot Air Vehicle" },
      { label: "Drive Land Vehicle", value: "Drive Land Vehicle" },
      { label: "Drive Sea Vehicle", value: "Drive Sea Vehicle" },
      { label: "Drive Air Vehicle", value: "Drive Air Vehicle" },
    ];
  }

  function onAttachmentsChange() {
    const nearestParentDataPath = getNearestParentDataPath(dataPath);
    const item = api.getValue(nearestParentDataPath) || record;

    // If this is an nested item, just return. (Like a weapon attachment)
    let pathToFields = "fields";
    if (nearestParentDataPath !== "") {
      pathToFields = `${nearestParentDataPath}.fields`;
    }
    let pathToData = "data";
    if (nearestParentDataPath !== "") {
      pathToData = `${nearestParentDataPath}.data`;
    }

    const attachments = value || [];
    const isArmor = record?.data?.type === "armor";

    // Make sure all attachments are of type "weapon attachment" or "armor attachment"
    const valuesToSet = {};
    attachments.forEach((attachment, index) => {
      if (attachment.data?.type !== "weapon attachment" && !isArmor) {
        valuesToSet[`${pathToData}.type`] = "weapon attachment";
        valuesToSet[
          `${pathToFields}.weaponAttachmentProperties.hidden`
        ] = false;
        valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = false;
      } else if (attachment.data?.type !== "armor attachment" && isArmor) {
        valuesToSet[`${pathToData}.type`] = "armor attachment";
        valuesToSet[`${pathToFields}.armorAttachmentProperties.hidden`] = false;
        valuesToSet[`${pathToFields}.hasUseBtn.hidden`] = false;
      }
    });

    // Get slots used
    let slotsUsed = 0;
    attachments.forEach((attachment) => {
      slotsUsed += attachment.data?.slots || 0;
    });

    const hardpoints = record.data?.hardpoints || 0;
    valuesToSet[`${pathToData}.slotsUsed`] = Math.min(slotsUsed, hardpoints);

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }
</script>

        width="100%"
        field="checkDV"
        label="Skill Check DV"
        placeholder="Enter DV..."
        minvalue="0"
      ></numberfield>
      <dropdown
        width="100%"
        field="checkSkill"
        label="Skill"
        placeholder="Select Skill..."
        optionsquery='{"type": "skill", "query": {}}'
      ></dropdown>
    </div>

  <box field="drugProperties" hidden="true" hidewhenidentified="false">
    <div style="display: flex; flex-direction: row; width: 100%; gap: 8px">
      <stringfield
        width="100%"
        field="primaryDiceRoll"
        label="Primary Humanity Loss Dice Roll"
        placeholder="Enter Primary Dice Roll..."
      ></stringfield>
      <numberfield
        width="100%"
        field="primaryHumanityLoss"
        label="Primary Humanity Loss"
        placeholder="Primary Humanity Loss..."
        minvalue="0"
      ></numberfield>
    </div>
    <div style="display: flex; flex-direction: row; width: 100%; gap: 8px">
      <stringfield
        width="100%"
        field="secondaryDiceRoll"
        label="Secondary Humanity Loss Dice Roll"
        placeholder="Enter Secondary Dice Roll..."
      ></stringfield>
      <numberfield
        width="100%"
        field="secondaryHumanityLoss"
        label="Secondary Humanity Loss"
        placeholder="Secondary Humanity Loss..."
        minvalue="0"
      ></numberfield>
    </div>
  </box>

  <!-- Pack Properties -->
  <box field="packProperties" hidden="true" hidewhenidentified="false">
    <div>
      <label
        field="itemListLabel"
        label="Items in Pack"
        size="sm"
        variant="bold"

    </div>

    <div>
      <list
        listtype="item_list"
        field="items"
        variant="striped"
        allowadd=""
      ></list>
    </div>

    <numberfield placeholder="0" field="cash" label="Cash"></numberfield>
  </box>

  <!-- Description -->

  <div style="margin-top: 8px">
    <divider label="Description"></divider>
  </div>

  <div style="margin-top: 8px">
    <richtextfield
      field="description"
      label="Description"
      placeholder="Enter Item description..."
      hidewhenidentified="false"
    >
    </richtextfield>
  </div>

  <stringfield
    field="unidentifiedDescription"
    label="Unidentified Description"
    placeholder="Enter description..."
    multiline="true"
    hidewhenidentified="true"
  >
  </stringfield>
</div>
