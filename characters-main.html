<script>
  function onDrop(type, recordLink) {
    if (type === "species") {
      onDropSpecies(type, recordLink);
    } else if (type === "careers") {
      onDropCareer(type, recordLink);
    } else if (type === "conditions") {
      onDropCondition(type, recordLink);
    }
  }

  function onDropSpecies(type, recordLink) {
    const species = record?.data?.species || [];
    const speciesName = recordLink.tooltip;
    const speciesObj = { ...recordLink.value, icon: "IconAlien" };

    const setValues = (updatedRecord) => {
      // Set species name, initial characteristics, initial XP
      const xpSpent = parseInt(record?.data?.spentXp || "0", 10);
      const xpCur = parseInt(record?.data?.xp || "0", 10);
      const valuesToSet = {
        "data.speciesName": speciesName,
        "fields.species.hidden": false,
        "data.brawn": speciesObj?.data?.brawn || 0,
        "data.agility": speciesObj?.data?.agility || 0,
        "data.intellect": speciesObj?.data?.intellect || 0,
        "data.cunning": speciesObj?.data?.cunning || 0,
        "data.willpower": speciesObj?.data?.willpower || 0,
        "data.presence": speciesObj?.data?.presence || 0,
        "data.xp": xpCur,
        "fields.speciesDetailsLabel.hidden": true,
      };

      if (xpSpent === 0 || xpCur === 0) {
        // We have no XP or haven't spent XP, so just set our current XP to initial XP
        valuesToSet["data.xp"] = speciesObj?.data?.startingXp || 0;
      }

      // First set the values, then update the attributes to get the new thresholds
      api.setValues(valuesToSet, (updatedRecord2) => {
        // Requery the record to get the latest data
        api.getRecord(record.recordType, record._id, (actualRecord) => {
          updateAttributes(actualRecord);
        });
      });
    };

    if (species.length > 0) {
      // Replace existing species
      api.removeValue("data.species", 0, () => {
        api.addValue("data.species", speciesObj, setValues);
      });
    } else {
      api.addValue("data.species", speciesObj, setValues);
    }
  }

  function onDropCareer(type, recordLink) {
    const careers = record?.data?.careers || [];
    const careerName = recordLink.tooltip;
    const careerObj = { ...recordLink.value, icon: "IconBadge" };

    // We allow multiple careers, so we just add it to the list
    api.addValue("data.careers", careerObj, () => {
      const newForceRating =
        (careerObj?.data?.forceRating || 0) + (record?.data?.forceRating || 0);
      const committedForce = parseInt(record?.data?.committedForce || "0", 10);
      const valuesToSet = {
        "data.careerName": careerName,
        "fields.careers.hidden": false,
        "data.forceRating": newForceRating,
        "data.totalForceRating": newForceRating,
        "data.remainingForce": Math.max(0, newForceRating - committedForce),
      };

      // Mark all career skills
      const careerSkills = careerObj?.data?.skills || "";
      const careerSkillsArray = careerSkills.toLowerCase().split(",");
      // Filter empty strings and trim whitespace
      const careerSkillsArrayFiltered = careerSkillsArray
        .filter((skill) => skill.trim() !== "")
        .map((skill) => skill.trim());
      const skills = record?.data?.skills || [];
      skills.forEach((skill, index) => {
        if (
          careerSkillsArrayFiltered.includes(skill.name.toLowerCase().trim())
        ) {
          valuesToSet[`data.skills.${index}.data.careerOrMinionSkill`] = true;
        }
      });

      api.setValues(valuesToSet, (updatedRecord) => {
        updateAttributes(updatedRecord, valuesToSet);
      });
    });
  }

  function onDeleteSpecies() {
    const valuesToSet = {
      "data.speciesName": "",
      "fields.species.hidden": true,
      "fields.speciesDetailsLabel.hidden": false,
    };

    updateAttributes(record, valuesToSet);

    api.setValues(valuesToSet);
  }

  function onDeleteCareer() {
    const valuesToSet = {
      "data.careerName": "",
      "fields.careers.hidden": true,
    };

    updateAttributes(record, valuesToSet);

    api.setValues(valuesToSet);
  }

  function onDropCondition(type, recordLink) {
    // Requery the record to get the latest record
    api.getRecord(record.recordType, record._id, (actualRecord) => {
      addConditionToRecord(actualRecord, recordLink);
    });
  }

  function onChangeConditions() {
    // Recalculate wounds and strain, and other attributes
    const deletedItem = data.deletedItem;
    if (!deletedItem) return;

    onConditionChange(record, deletedItem);
  }

  function updateForceRating() {
    const baseForceRating = parseInt(record?.data?.forceRating || "0", 10);
    const committedForce = parseInt(record?.data?.committedForce || "0", 10);
    const remainingForce = Math.max(0, baseForceRating - committedForce);

    api.setValues({
      "data.totalForceRating": baseForceRating,
      "data.remainingForce": remainingForce,
    });
  }

  function onLoadCharacter() {
    // Initialize skills if needed
    initializeSkills(record);
  }

  function rest() {
    const currentWounds = parseInt(record?.data?.wounds || "0", 10);
    const newWounds = Math.max(0, currentWounds - 1);

    const valuesToSet = {
      "data.healingUsed": 0,
    };

    // Use updateAttribute to properly recalculate remaining values
    updateAttribute({
      record,
      attribute: "wounds",
      value: newWounds,
      moreValuesToSet: valuesToSet,
    });
    updateAttribute({
      record,
      attribute: "strain",
      value: 0,
      moreValuesToSet: valuesToSet,
    });

    api.setValues(valuesToSet);

    api.sendMessage(
      `Resting for day. Recovered 1 wound (${currentWounds} → ${newWounds}) and all strain.`,
    );
  }

  function showObligationTable() {
    // First get the party characters
    api.getParty((party) => {
      if (party.length === 0) {
        api.sendMessage(
          "No Party Members to show Obligation Table for. Open the Party Sheet from the View menu and drag a Character to the Party Sheet.",
        );
        return;
      }

      // Collect all obligations from all characters
      let allObligations = [];

      // First, calculate total obligation for each character
      const characterTotals = party.map((character) => {
        const obligations = character.data?.obligations || [];
        const totalValue = obligations.reduce((sum, obligation) => {
          return sum + parseInt(obligation.data?.value || "0", 10);
        }, 0);

        return {
          character,
          totalValue,
          obligations,
        };
      });

      // Sort characters by total obligation value (highest to lowest)
      characterTotals.sort((a, b) => b.totalValue - a.totalValue);

      // Now collect all obligations in the correct order
      characterTotals.forEach((charData) => {
        charData.obligations.forEach((obligation) => {
          allObligations.push({
            characterName: charData.character.name,
            obligationType: obligation.name,
            value: parseInt(obligation.data?.value || "0", 10),
          });
        });
      });

      // Calculate cumulative ranges
      let currentTotal = 0;
      const obligationRanges = allObligations.map((obligation) => {
        const rangeStart = currentTotal + 1;
        currentTotal += obligation.value;
        const rangeEnd = currentTotal;

        return {
          ...obligation,
          range: `${rangeStart}-${rangeEnd}`,
          rangeStart,
          rangeEnd,
        };
      });

      // Calculate total party obligation
      const totalObligation = currentTotal;

      // Create the markdown table header
      let tableMarkdown = "## Obligation Check Chart\n\n";
      tableMarkdown += "| Range | Obligation Type | Character |\n";
      tableMarkdown += "|-------|----------------|-----------|\n";

      // Add each obligation to the table
      obligationRanges.forEach((obligation) => {
        tableMarkdown += `| ${obligation.range} | ${obligation.obligationType} | ${obligation.characterName} |\n`;
      });

      // Add total obligation information
      tableMarkdown += `\n**Total Party Obligation: ${totalObligation}**\n\n`;

      // Send the table to the chat
      api.sendMessage(tableMarkdown);
    });
  }

  function rollObligation() {
    api.promptRoll(
      "Obligation Roll",
      "1d100",
      [],
      { isNarrative: false },
      "obligation",
    );
  }

  function showDutyTable() {
    // First get the party characters
    api.getParty((party) => {
      if (party.length === 0) {
        api.sendMessage(
          "No Party Members to show Duty Table for. Open the Party Sheet from the View menu and drag a Character to the Party Sheet.",
        );
        return;
      }

      // Collect all duties from all characters
      let allDuties = [];

      // First, calculate total duty for each character
      const characterTotals = party.map((character) => {
        const duties = character.data?.duties || [];
        const totalValue = duties.reduce((sum, duty) => {
          return sum + parseInt(duty.data?.value || "0", 10);
        }, 0);

        return {
          character,
          totalValue,
          duties,
        };
      });

      // Sort characters by total duty value (highest to lowest)
      characterTotals.sort((a, b) => b.totalValue - a.totalValue);

      // Now collect all duties in the correct order
      characterTotals.forEach((charData) => {
        charData.duties.forEach((duty) => {
          allDuties.push({
            characterName: charData.character.name,
            dutyType: duty.name,
            value: parseInt(duty.data?.value || "0", 10),
          });
        });
      });

      // Calculate cumulative ranges
      let currentTotal = 0;
      const dutyRanges = allDuties.map((duty) => {
        const rangeStart = currentTotal + 1;
        currentTotal += duty.value;
        const rangeEnd = currentTotal;

        return {
          ...duty,
          range: `${rangeStart}-${rangeEnd}`,
          rangeStart,
          rangeEnd,
        };
      });

      // Calculate total party duty
      const totalDuty = currentTotal;

      // Create the markdown table header
      let tableMarkdown = "## Duty Check Chart\n\n";
      tableMarkdown += "| Range | Duty Type | Character |\n";
      tableMarkdown += "|-------|-----------|-----------|\n";

      // Add each duty to the table
      dutyRanges.forEach((duty) => {
        tableMarkdown += `| ${duty.range} | ${duty.dutyType} | ${duty.characterName} |\n`;
      });

      // Add total duty information
      tableMarkdown += `\n**Total Party Duty: ${totalDuty}**\n\n`;

      // Send the table to the chat
      api.sendMessage(tableMarkdown);
    });
  }

  function rollDuty() {
    api.promptRoll("Duty Roll", "1d100", [], { isNarrative: false }, "duty");
  }

  function rollMorality() {
    api.promptRoll(
      "Morality Conflict Roll",
      "1d10",
      [],
      { isNarrative: false, conflict: record?.data?.conflict || 0 },
      "conflict",
    );
  }

  function onRollCriticalInjury() {
    rollCriticalInjury(record, "injury", []);
  }

  function triggerObligation() {
    const options = [
      { label: "Affected (x1)", value: "1" },
      { label: "Triggered (x2)", value: "2" },
      { label: "Affected Doubled (x2)", value: "affected2" },
      { label: "Triggered Doubled (x4)", value: "4" },
    ];
    api.showPrompt(
      "Trigger Obligation",
      "Obligation Severity",
      "Affected = party member, Triggered = the character whose obligation was rolled. Doubled = doubles were rolled.",
      options,
      null,
      (value) => {
        const selection = value[0];
        let penalty = 0;
        let label = "";
        if (selection === "1") {
          penalty = 1;
          label = "Affected (−1)";
        } else if (selection === "2") {
          penalty = 2;
          label = "Triggered (−2)";
        } else if (selection === "affected2") {
          penalty = 2;
          label = "Affected Doubled (−2)";
        } else if (selection === "4") {
          penalty = 4;
          label = "Triggered Doubled (−4)";
        }
        if (penalty === 0) return;

        const currentThreshold = parseInt(
          record?.data?.strainThreshold || "0",
          10,
        );
        const currentStrain = parseInt(record?.data?.strain || "0", 10);
        const newThreshold = Math.max(0, currentThreshold - penalty);
        const newRemaining = Math.max(0, newThreshold - currentStrain);

        api.setValues({
          "data.strainThreshold": newThreshold,
          "data.strainRemaining": newRemaining,
          "data.obligationPenalty": penalty,
        });

        const charName = record?.name || "Unknown";
        api.sendMessage(
          `[center]**Obligation ${label}**: ${charName}'s Strain Threshold reduced by ${penalty} (${currentThreshold} → ${newThreshold})[/center]`,
        );
      },
      "OK",
      "Cancel",
      1,
    );
  }

  function revertObligation() {
    const penalty = parseInt(record?.data?.obligationPenalty || "0", 10);
    if (penalty === 0) {
      api.showNotification(
        "No obligation penalty to revert.",
        "yellow",
        "Obligation",
      );
      return;
    }

    const currentThreshold = parseInt(record?.data?.strainThreshold || "0", 10);
    const currentStrain = parseInt(record?.data?.strain || "0", 10);
    const newThreshold = currentThreshold + penalty;
    const newRemaining = Math.max(0, newThreshold - currentStrain);

    api.setValues({
      "data.strainThreshold": newThreshold,
      "data.strainRemaining": newRemaining,
      "data.obligationPenalty": 0,
    });

    const charName = record?.name || "Unknown";
    api.sendMessage(
      `[center]**Obligation Reverted**: ${charName}'s Strain Threshold restored by ${penalty} (${currentThreshold} → ${newThreshold})[/center]`,
    );
  }

  function triggerDuty() {
    const options = [
      { label: "Affected (x1)", value: "1" },
      { label: "Triggered (x2)", value: "2" },
      { label: "Affected Doubled (x2)", value: "affected2" },
      { label: "Triggered Doubled (x4)", value: "4" },
    ];
    api.showPrompt(
      "Trigger Duty",
      "Duty Severity",
      "Affected = party member, Triggered = the character whose duty was rolled. Doubled = doubles were rolled.",
      options,
      null,
      (value) => {
        const selection = value[0];
        let bonus = 0;
        let label = "";
        if (selection === "1") {
          bonus = 1;
          label = "Affected (+1)";
        } else if (selection === "2") {
          bonus = 2;
          label = "Triggered (+2)";
        } else if (selection === "affected2") {
          bonus = 2;
          label = "Affected Doubled (+2)";
        } else if (selection === "4") {
          bonus = 4;
          label = "Triggered Doubled (+4)";
        }
        if (bonus === 0) return;

        const currentThreshold = parseInt(
          record?.data?.woundThreshold || "0",
          10,
        );
        const currentWounds = parseInt(record?.data?.wounds || "0", 10);
        const newThreshold = currentThreshold + bonus;
        const newRemaining = Math.max(0, newThreshold - currentWounds);

        api.setValues({
          "data.woundThreshold": newThreshold,
          "data.woundsRemaining": newRemaining,
          "data.dutyBonus": bonus,
        });

        const charName = record?.name || "Unknown";
        api.sendMessage(
          `[center]**Duty ${label}**: ${charName}'s Wound Threshold increased by ${bonus} (${currentThreshold} → ${newThreshold})[/center]`,
        );
      },
      "OK",
      "Cancel",
      1,
    );
  }

  function revertDuty() {
    const bonus = parseInt(record?.data?.dutyBonus || "0", 10);
    if (bonus === 0) {
      api.showNotification("No duty bonus to revert.", "yellow", "Duty");
      return;
    }

    const currentThreshold = parseInt(record?.data?.woundThreshold || "0", 10);
    const currentWounds = parseInt(record?.data?.wounds || "0", 10);
    const newThreshold = Math.max(0, currentThreshold - bonus);
    const newRemaining = Math.max(0, newThreshold - currentWounds);

    api.setValues({
      "data.woundThreshold": newThreshold,
      "data.woundsRemaining": newRemaining,
      "data.dutyBonus": 0,
    });

    const charName = record?.name || "Unknown";
    api.sendMessage(
      `[center]**Duty Reverted**: ${charName}'s Wound Threshold restored by ${bonus} (${currentThreshold} → ${newThreshold})[/center]`,
    );
  }
</script>

<!-- Datapad-themed character sheet (SWRPG / amber accent). Field
     bindings, list types, on* handlers, and conditional fields are
     unchanged from the prior layout — only the chrome is new.

     Datapad chrome:
       - sheet--datapad: enables Rajdhani labels + cyan/amber tokens
       - sheet--datapad--swrpg: amber accent (Light Side feel)
       - rvtt-datapad-section: chamfered corner panel
       - rvtt-datapad-divider: bracketed-label divider
-->
<div
  class="sheet--datapad sheet--datapad--swrpg"
  style="margin-top: 4px; display: flex; flex-direction: column; gap: 8px"
>
  <!-- ===== HEADER ===== -->
  <div class="rvtt-datapad-section">
    <div style="display: flex; align-items: center; gap: 14px">
      <portrait variant="fancy" width="120px" height="120px"></portrait>
      <div
        style="
          flex: 1;
          min-width: 0;
          display: flex;
          flex-direction: column;
          gap: 4px;
        "
      >
        <label field="namefield" class="rvtt-datapad-display-name"></label>
        <div style="display: flex; gap: 4px; align-items: flex-end">
          <stringfield
            width="100%"
            size="xs"
            field="speciesName"
            placeholder="Drag a Species&#8230;"
            label="Species"
          ></stringfield>
          <list
            width="fit-content"
            height="42px"
            hidden="true"
            listtype="character_species_list"
            field="species"
            onchange="onDeleteSpecies()"
          ></list>
          <stringfield
            width="100%"
            size="xs"
            field="careerName"
            placeholder="Drag a Career&#8230;"
            label="Career"
          ></stringfield>
          <list
            width="fit-content"
            height="42px"
            hidden="true"
            listtype="character_career_list"
            field="careers"
            onchange="onDeleteCareer()"
          ></list>
        </div>
        <div
          style="display: flex; gap: 12px; align-items: center; margin-top: 2px"
        >
          <span class="rvtt-datapad-mono-dim">XP</span>
          <numberfield
            field="spentXp"
            size="xs"
            hidecontrols="true"
            width="56px"
            placeholder="0"
          ></numberfield>
          <span class="rvtt-datapad-mono-dim">/</span>
          <numberfield
            field="xp"
            size="xs"
            hidecontrols="true"
            width="56px"
            placeholder="0"
          ></numberfield>
          <span class="rvtt-datapad-mono-dim" style="margin-left: auto"
            >REST</span
          >
          <iconbutton
            field="Rest"
            size="md"
            variant="subtle"
            options='[{"icon": "IconBed", "label": "Rest", "value": "rest"}]'
            onchange=""
            onclick="rest()"
          ></iconbutton>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== ATTRIBUTES ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Attributes</span>
    </div>
    <div
      style="
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 8px;
      "
    >
      <attribute
        field="brawn"
        label="Brawn"
        size="md"
        width="100%"
        placeholder="0"
        containervariant="fancy"
        textalign="center"
        bold="true"
        showbutton
        buttontext="Roll"
        buttonsize="xxs"
        buttonvariant="outline"
        buttonposition="bottom"
        onclick="rollCheck('brawn')"
        onchange="updateAttribute({ record, attribute: 'brawn', value })"
        onload="onLoadCharacter()"
      ></attribute>
      <attribute
        field="agility"
        label="Agility"
        size="md"
        width="100%"
        placeholder="0"
        containervariant="fancy"
        textalign="center"
        bold="true"
        showbutton
        buttontext="Roll"
        buttonsize="xxs"
        buttonvariant="outline"
        buttonposition="bottom"
        onclick="rollCheck('agility')"
        onchange="updateAttribute({ record, attribute: 'agility', value })"
      ></attribute>
      <attribute
        field="intellect"
        label="Intellect"
        size="md"
        width="100%"
        placeholder="0"
        containervariant="fancy"
        textalign="center"
        bold="true"
        showbutton
        buttontext="Roll"
        buttonsize="xxs"
        buttonvariant="outline"
        buttonposition="bottom"
        onclick="rollCheck('intellect')"
        onchange="updateAttribute({ record, attribute: 'intellect', value })"
      ></attribute>
      <attribute
        field="cunning"
        label="Cunning"
        size="md"
        width="100%"
        placeholder="0"
        containervariant="fancy"
        textalign="center"
        bold="true"
        showbutton
        buttontext="Roll"
        buttonsize="xxs"
        buttonvariant="outline"
        buttonposition="bottom"
        onclick="rollCheck('cunning')"
        onchange="updateAttribute({ record, attribute: 'cunning', value })"
      ></attribute>
      <attribute
        field="willpower"
        label="Willpower"
        size="md"
        width="100%"
        placeholder="0"
        containervariant="fancy"
        textalign="center"
        bold="true"
        showbutton
        buttontext="Roll"
        buttonsize="xxs"
        buttonvariant="outline"
        buttonposition="bottom"
        onclick="rollCheck('willpower')"
        onchange="updateAttribute({ record, attribute: 'willpower', value })"
      ></attribute>
      <attribute
        field="presence"

        containervariant="fancy"

        bold="true"
        showbutton

        buttonsize="xxs"

  <!-- ===== VITALS ===== -->

    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Vitals</span>
    </div>

      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        align-items: flex-end;
      "

      <numberfield
        placeholder="0"

        width="80px"
        field="soakValue"
        label="Soak"
      ></numberfield>
      <numberfield
        placeholder="0"

        width="120px"
        icon="IconHeartFilled"
        field="woundThreshold"
        label="Wound Threshold"
        color="pink"
        onchange="
          updateAttribute({ record, attribute: 'woundThreshold', value })
        "
      ></numberfield>
      <numberfield
        placeholder="0"
        size="sm"
        width="90px"
        icon="IconBandageFilled"
        field="wounds"
        label="Wounds"
        color="red"
        minvalue="0"
        onchange="updateAttribute({ record, attribute: 'wounds', value })"
      ></numberfield>
      <numberfield
        placeholder="0"
        size="sm"
        width="120px"
        icon="IconHeartbeat"
        field="strainThreshold"
        label="Strain Threshold"
        color="blue"
        onchange="
          updateAttribute({ record, attribute: 'strainThreshold', value })

      ></numberfield>
      <numberfield
        placeholder="0"

        width="90px"

      <numberfield

        icon="IconShield"

      ></numberfield>
      <numberfield
        placeholder="0"
        size="sm"
        width="120px"
        field="defenseRanged"

        label="Defense (Ranged)"

      ></numberfield>

  <!-- ===== CRITICAL INJURIES ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Critical Injuries</span>
    </div>
    <div style="display: flex; justify-content: flex-end; margin-bottom: 4px">
      <button
        field="rollCriticalInjuryBtn"
        size="xs"
        variant="outline"
        color="primary"
        label="Roll for Critical Injury"
        onclick="onRollCriticalInjury()"
      ></button>
    </div>
    <div style="min-height: 60px; max-height: 200px; overflow-y: auto">
      <list
        listtype="conditions_list"
        field="criticalInjuries"
        height="100%"
        variant="striped"
        onchange="onChangeConditions()"
      ></list>
    </div>
  </div>

  <!-- ===== OBLIGATION ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Obligation</span>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 4px;
        justify-content: flex-end;
      "
    >
      <button
        field="triggerObligationBtn"
        size="xs"
        variant="outline"
        color="red"
        label="Trigger"
        onclick="triggerObligation()"
      ></button>
      <button
        field="revertObligationBtn"
        size="xs"
        variant="outline"
        color="tertiary"
        label="End Session"
        onclick="revertObligation()"
      ></button>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        align-items: flex-end;
        margin-top: 4px;
      "
    >
      <div style="width: 70px">
        <label
          class="rvtt-datapad-label rvtt-datapad-label--accent"
          field="obligationValueLabel"
          label="Value"
        ></label>
      </div>
      <div style="flex-grow: 1">
        <label
          class="rvtt-datapad-label rvtt-datapad-label--accent"
          field="obligationNameLabel"
          label="Obligation Type"
        ></label>
      </div>
      <div
        style="margin-left: 8px; display: flex; flex-direction: row; gap: 4px"
      >
        <button
          field="showTableBtn"
          size="xs"
          variant="outline"
          color="secondary"
          label="Show Party Table in Chat"
          onclick="showObligationTable()"
        ></button>
        <button
          field="rollObligationBtn"
          size="xs"
          variant="outline"
          color="primary"
          label="Roll for Session"
          onclick="rollObligation()"
        ></button>
      </div>
    </div>
    <div style="min-height: 60px; max-height: 200px; overflow-y: auto">
      <list
        listtype="obligation_list"
        field="obligations"
        height="100%"
        variant="striped"
      ></list>
    </div>
  </div>

  <!-- ===== DUTY ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Duty</span>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 4px;
        justify-content: flex-end;
      "
    >
      <button
        field="triggerDutyBtn"
        size="xs"
        variant="outline"
        color="red"
        label="Trigger"
        onclick="triggerDuty()"
      ></button>
      <button
        field="revertDutyBtn"
        size="xs"
        variant="outline"
        color="tertiary"
        label="End Session"
        onclick="revertDuty()"
      ></button>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        align-items: flex-end;
        margin-top: 4px;
      "
    >
      <div style="width: 70px">
        <label
          class="rvtt-datapad-label rvtt-datapad-label--accent"
          field="dutyValueLabel"
          label="Value"
        ></label>
      </div>
      <div style="flex-grow: 1">
        <label
          class="rvtt-datapad-label rvtt-datapad-label--accent"
          field="dutyNameLabel"
          label="Duty Type"
        ></label>
      </div>
      <div
        style="margin-left: 8px; display: flex; flex-direction: row; gap: 4px"
      >
        <button
          field="showDutyTableBtn"
          size="xs"
          variant="outline"
          color="secondary"
          label="Show Party Table in Chat"
          onclick="showDutyTable()"
        ></button>
        <button
          field="rollDutyBtn"
          size="xs"
          variant="outline"
          color="primary"
          label="Roll for Session"
          onclick="rollDuty()"
        ></button>
      </div>
    </div>
    <div style="min-height: 60px; max-height: 200px; overflow-y: auto">
      <list
        listtype="duty_list"
        field="duties"
        height="100%"
        variant="striped"
      ></list>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        align-items: center;
        justify-content: center;
        margin-top: 6px;
      "
    >
      <numberfield
        placeholder="0"
        size="xs"
        field="contributionRank"
        label="Contribution Rank"
      ></numberfield>
    </div>
  </div>

  <!-- ===== MORALITY ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Morality</span>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        align-items: flex-end;
        justify-content: center;
      "
    >
      <numberfield
        size="sm"
        label="Morality"
        width="100px"
        field="morality"
        defaultvalue="50"
        placeholder="50"
      ></numberfield>
      <numberfield
        placeholder="0"
        size="sm"
        width="100px"
        field="conflict"
        label="Conflict"
        minvalue="0"
      ></numberfield>
      <button
        field="moralityRollBtn"
        size="xs"
        variant="outline"
        color="primary"
        label="Conflict Roll"
        onclick="rollMorality()"
      ></button>
    </div>
    <accordion field="moralityAcc" label="Notes" size="xs" variant="filled">
      <richtextfield
        disablecontrols="true"
        field="moralityNotes"
      ></richtextfield>
    </accordion>
  </div>

  <!-- ===== FORCE RATING ===== -->
  <div class="rvtt-datapad-section">
    <div class="rvtt-datapad-divider">
      <span class="rvtt-datapad-divider__label">Force Rating</span>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 6px;
        width: 100%;
        justify-content: center;
      "
    >
      <numberfield
        placeholder="0"
        size="sm"
        width="120px"
        field="forceRating"
        label="Total Force Rating"
        onchange="updateForceRating()"
      ></numberfield>
      <numberfield
        placeholder="0"
        size="sm"
        width="100px"
        field="committedForce"
        label="Committed"
        onchange="updateForceRating()"
        minvalue="0"
      ></numberfield>
      <numberfield
        placeholder="0"
        size="sm"
        width="100px"
        field="remainingForce"
        hidecontrols="true"
        label="Remaining"
        editable="false"
      ></numberfield>
    </div>
  </div>
</div>
