<script>
  function onLoad() {
    const recordType = record.recordType;
    const nearestParentDataPath = getNearestParentDataPath(dataPath);
    const forcePower = api.getValue(nearestParentDataPath);

    if (!forcePower) return;

    const prefix = nearestParentDataPath ? `${nearestParentDataPath}.` : "";
    const initalized = forcePower?.data?.initalized || false;
    const valuesToSet = {};

    if (recordType === "characters") {
      // Player view: canvas tree, hide editor grid (backward-compat fallback —
      // old force powers dropped before the canvas changes hit this branch
      // and get the right visibility on next open).
      valuesToSet[`${prefix}fields.editorTreeBox.hidden`] = true;
      valuesToSet[`${prefix}fields.canvasTreeBox.hidden`] = false;
      // Stamp characterId so canvas event handlers (record = fp entry) can
      // fetch the character to apply toggle patches. Required for legacy
      // force powers dropped before this backfill landed.
      if (forcePower?.data?.characterId !== record._id) {
        valuesToSet[`${prefix}data.characterId`] = record._id;
      }
      if (!initalized) {
        valuesToSet[`${prefix}data.initalized`] = true;
      }
    } else if (recordType === "force_powers") {
      // Authoring/compendium view. editorTreeBox + canvasTreeBoxLocked use
      // hideonlocked attributes so lock state picks which one renders:
      //   unlocked → editor grid; locked → rendered canvas tree.
      valuesToSet[`${prefix}fields.editorTreeBox.hidden`] = false;
      valuesToSet[`${prefix}fields.canvasTreeBox.hidden`] = true;
      valuesToSet[`${prefix}fields.canvasTreeBoxLocked.hidden`] = false;
      showHideDividers();
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet, () => {
        // paint is a no-op when no canvas is mounted (unlocked compendium).
        paintForceTree();
      });
    }
    paintForceTree();
  }

  function onHideTalentChange(value, talentList) {
    const valuesToShow = [];
    const valuesToHide = [];

    if (value === "Yes") {
      valuesToHide.push(talentList);

      // If we're hiding a talent, we need to also hide the horizontal connector to its left
      if (talentList === "talent1_2") {
        valuesToHide.push("h_connector1_2");
        valuesToShow.push("no_talent1_2");
      } else if (talentList === "talent1_3") {
        valuesToHide.push("h_connector1_3");
        valuesToShow.push("no_talent1_3");
      } else if (talentList === "talent1_4") {
        valuesToHide.push("h_connector1_4");
        valuesToShow.push("no_talent1_4");
      } else if (talentList === "talent2_2") {
        valuesToHide.push("h_connector2_2");
        valuesToShow.push("no_talent2_2");
      } else if (talentList === "talent2_3") {
        valuesToHide.push("h_connector2_3");
        valuesToShow.push("no_talent2_3");
      } else if (talentList === "talent2_4") {
        valuesToHide.push("h_connector2_4");
        valuesToShow.push("no_talent2_4");
      } else if (talentList === "talent3_2") {
        valuesToHide.push("h_connector3_2");
        valuesToShow.push("no_talent3_2");
      } else if (talentList === "talent3_3") {
        valuesToHide.push("h_connector3_3");
        valuesToShow.push("no_talent3_3");
      } else if (talentList === "talent3_4") {
        valuesToHide.push("h_connector3_4");
        valuesToShow.push("no_talent3_4");
      } else if (talentList === "talent4_2") {
        valuesToHide.push("h_connector4_2");
        valuesToShow.push("no_talent4_2");
      } else if (talentList === "talent4_3") {
        valuesToHide.push("h_connector4_3");
        valuesToShow.push("no_talent4_3");
      } else if (talentList === "talent4_4") {
        valuesToHide.push("h_connector4_4");
        valuesToShow.push("no_talent4_4");
      }
    } else {
      valuesToShow.push(talentList);

      // If we're showing a talent, we need to also show the horizontal connector to its left
      if (talentList === "talent1_2") {
        valuesToShow.push("h_connector1_2");
        valuesToHide.push("no_talent1_2");
      } else if (talentList === "talent1_3") {
        valuesToShow.push("h_connector1_3");
        valuesToHide.push("no_talent1_3");
      } else if (talentList === "talent1_4") {
        valuesToShow.push("h_connector1_4");
        valuesToHide.push("no_talent1_4");
      } else if (talentList === "talent2_2") {
        valuesToShow.push("h_connector2_2");
        valuesToHide.push("no_talent2_2");
      } else if (talentList === "talent2_3") {
        valuesToShow.push("h_connector2_3");
        valuesToHide.push("no_talent2_3");
      } else if (talentList === "talent2_4") {
        valuesToShow.push("h_connector2_4");
        valuesToHide.push("no_talent2_4");
      } else if (talentList === "talent3_2") {
        valuesToShow.push("h_connector3_2");
        valuesToHide.push("no_talent3_2");
      } else if (talentList === "talent3_3") {
        valuesToShow.push("h_connector3_3");
        valuesToHide.push("no_talent3_3");
      } else if (talentList === "talent3_4") {
        valuesToShow.push("h_connector3_4");
        valuesToHide.push("no_talent3_4");
      } else if (talentList === "talent4_2") {
        valuesToShow.push("h_connector4_2");
        valuesToHide.push("no_talent4_2");
      } else if (talentList === "talent4_3") {
        valuesToShow.push("h_connector4_3");
        valuesToHide.push("no_talent4_3");
      } else if (talentList === "talent4_4") {
        valuesToShow.push("h_connector4_4");
        valuesToHide.push("no_talent4_4");
      }
    }

    if (valuesToHide.length > 0) {
      api.setHidden(valuesToHide, true, () => {
        if (valuesToShow.length > 0) {
          api.setHidden(valuesToShow, false);
        }
      });
    } else if (valuesToShow.length > 0) {
      api.setHidden(valuesToShow, false);
    }
  }

  function showHideDividers() {
    const nearestParentDataPath = getNearestParentDataPath(dataPath);
    const forcePower = api.getValue(nearestParentDataPath) || record;
    const valuesToSet = {};

    // Check all dividers in the talent tree
    const dividersToCheck = [
      // Row 0 → Row 1 connections
      "connector1_1",
      "connector1_2",
      "connector1_3",
      "connector1_4",

      // Row 1 → Row 2 connections
      "connector2_1",
      "connector2_2",
      "connector2_3",
      "connector2_4",

      // Row 1 horizontal connections
      "h_connector1_2",
      "h_connector1_3",
      "h_connector1_4",

      // Row 2 → Row 3 connections
      "connector3_1",
      "connector3_2",
      "connector3_3",
      "connector3_4",

      // Row 2 horizontal connections
      "h_connector2_2",
      "h_connector2_3",
      "h_connector2_4",

      // Row 3 → Row 4 connections
      "connector4_1",
      "connector4_2",
      "connector4_3",
      "connector4_4",

      // Row 3 horizontal connections
      "h_connector3_2",
      "h_connector3_3",
      "h_connector3_4",

      // Row 4 → Row 5 connections
      "connector5_1",
      "connector5_2",
      "connector5_3",
      "connector5_4",

      // Row 4 horizontal connections
      "h_connector4_2",
      "h_connector4_3",
      "h_connector4_4",

      // Row 5 horizontal connections
      "h_connector5_2",
      "h_connector5_3",
      "h_connector5_4",
    ];

    dividersToCheck.forEach((divider) => {
      if (
        forcePower?.data?.[divider] &&
        forcePower?.data?.[divider] === "Yes" &&
        forcePower?.fields?.[`${divider}_divider`]?.hidden !== false
      ) {
        valuesToSet[
          `${nearestParentDataPath}${
            nearestParentDataPath ? "." : ""
          }fields.${divider}_divider.hidden`
        ] = false;
      } else if (
        forcePower?.data?.[divider] &&
        forcePower?.data?.[divider] === "No" &&
        forcePower?.fields?.[`${divider}_divider`]?.hidden !== true
      ) {
        valuesToSet[
          `${nearestParentDataPath}${
            nearestParentDataPath ? "." : ""
          }fields.${divider}_divider.hidden`
        ] = true;
      }
    });

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  // ============================================================
  // Canvas force power tree (player view)
  // ============================================================
  // Force power has a header banner + 4×4 upgrade grid. Upgrades go INTO the
  // force power's `data.talents` (like sig abilities), and cost reduces the
  // character's `data.spentXp`.
  //
  // Special layout: a row's columns can be "merged" — when `hide{R}_{C}` is
  // "Yes", that cell is rendered as a wider extension of the previous cell
  // (the editor shows "(Same as the Left Upgrade)" for these). The canvas
  // collapses these into a single wider tile spanning multiple column slots.

  function getForceForCanvas() {
    const path = getNearestParentDataPath(dataPath);
    return { fp: api.getValue(path) || record, fpPath: path };
  }

  // Two canvases share this code: `forceTreeCanvas` lives in the character
  // view (canvasTreeBox), `forceTreeCanvasLocked` lives in the locked-compendium
  // view (canvasTreeBoxLocked). Visibility is mutually exclusive by
  // construction, so probe both and use whichever is mounted.
  function getActiveCanvas() {
    return (
      api.getCanvas("forceTreeCanvas") ||
      api.getCanvas("forceTreeCanvasLocked")
    );
  }

  function ttLayout() {
    const c = getActiveCanvas();
    if (!c) return null;
    const W = c.width;
    const H = c.height;
    const PAD = 8;
    const HGAP = 18;
    const VGAP = 24;
    const BANNER_H = 56;
    const MID_CONN_H = 18;
    const tileW = Math.floor((W - 2 * PAD - 3 * HGAP) / 4);
    const tileH = Math.floor(
      (H - 2 * PAD - BANNER_H - MID_CONN_H - 3 * VGAP) / 4,
    );
    const bannerY = PAD;
    const tileTop = bannerY + BANNER_H + MID_CONN_H;
    return {
      W: W,
      H: H,
      PAD: PAD,
      HGAP: HGAP,
      VGAP: VGAP,
      BANNER_H: BANNER_H,
      MID_CONN_H: MID_CONN_H,
      bannerY: bannerY,
      tileTop: tileTop,
      tileW: tileW,
      tileH: tileH,
    };
  }

  function ttTileRect(row, col, lay) {
    const x = lay.PAD + (col - 1) * (lay.tileW + lay.HGAP);
    const y = lay.tileTop + (row - 1) * (lay.tileH + lay.VGAP);
    return { x: x, y: y, w: lay.tileW, h: lay.tileH };
  }

  // Build groups for a row: each group has { startCol, endCol } where cols
  // startCol+1..endCol are merged into startCol (hide{R}_{C} === "Yes"). The
  // merged tile spans the full width of all merged columns.
  function ttRowGroups(fp, row) {
    const groups = [];
    let curStart = 1;
    for (let col = 2; col <= 4; col++) {
      const isHidden = fp.data?.[`hide${row}_${col}`] === "Yes";
      if (!isHidden) {
        groups.push({ startCol: curStart, endCol: col - 1 });
        curStart = col;
      }
    }
    groups.push({ startCol: curStart, endCol: 4 });
    return groups;
  }

  // Bounding rect for a merged group spanning startCol..endCol in row.
  function ttGroupRect(row, startCol, endCol, lay) {
    const start = ttTileRect(row, startCol, lay);
    const end = ttTileRect(row, endCol, lay);
    return {
      x: start.x,
      y: start.y,
      w: end.x + end.w - start.x,
      h: start.h,
    };
  }

  function ttCheckboxRect(rect) {
    const sz = 20;
    return { x: rect.x + rect.w - sz - 5, y: rect.y + 5, w: sz, h: sz };
  }

  function ttChosenIdFor(talent, slotPathDot) {
    if (!talent) return null;
    const ranked = talent?.data?.ranked === "yes";
    return ranked ? talent._id : `${talent._id}-${slotPathDot}`;
  }

  // Per-slot chosen state (mirrors specialization-main.html).
  function ttIsSlotChosen(fp, row, col) {
    const slot = fp?.data?.[`talent${row}_${col}`]?.[0];
    return slot?.data?.chosen === "yes";
  }

  function ttChosenRank(talent, fpEntry) {
    if (!talent || talent?.data?.ranked !== "yes") return 0;
    const list = (fpEntry || record)?.data?.talents || [];
    const found = list.find((t) => t._id === talent._id);
    return found?.data?.rank || 0;
  }

  function ttFindChosen(talent, slotPathDot, fpEntry) {
    const id = ttChosenIdFor(talent, slotPathDot);
    if (!id) return null;
    const list = (fpEntry || record).data?.talents || [];
    return list.find((t) => t._id === id) || null;
  }

  function ttStripHtml(s) {
    return (s || "")
      .replace(/<[^>]*>/g, " ")
      .replace(/&nbsp;/g, " ")
      .replace(/&amp;/g, "&")
      .replace(/&lt;/g, "<")
      .replace(/&gt;/g, ">")
      .replace(/\s+/g, " ");
  }

  function ttTruncate(c, text, maxW) {
    if (!text) return "";
    if (c.measureText(text).width <= maxW) return text;
    let lo = 0;
    let hi = text.length;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (c.measureText(text.slice(0, mid) + "…").width <= maxW) lo = mid;
      else hi = mid;
    }
    return text.slice(0, lo) + "…";
  }

  function ttWrapText(c, text, maxW, maxLines) {
    const words = (text || "").split(" ");
    const lines = [];
    let line = "";
    for (let i = 0; i < words.length; i++) {
      const w = words[i];
      const test = line ? line + " " + w : w;
      if (c.measureText(test).width > maxW && line) {
        lines.push(line);
        line = w;
        if (lines.length >= maxLines) break;
      } else {
        line = test;
      }
    }
    if (line && lines.length < maxLines) lines.push(line);
    if (lines.length >= maxLines) {
      lines[maxLines - 1] = ttTruncate(c, lines[maxLines - 1] + "…", maxW);
    }
    return lines;
  }

  // Hit-test: walk groups per row, return { row, startCol, region } or null.
  function ttHitTest(x, y, lay, fp) {
    for (let row = 1; row <= 4; row++) {
      const groups = ttRowGroups(fp, row);
      for (let i = 0; i < groups.length; i++) {
        const g = groups[i];
        const rect = ttGroupRect(row, g.startCol, g.endCol, lay);
        const cb = ttCheckboxRect(rect);
        if (x >= cb.x && x <= cb.x + cb.w && y >= cb.y && y <= cb.y + cb.h) {
          return { row: row, col: g.startCol, region: "checkbox" };
        }
        if (
          x >= rect.x &&
          x <= rect.x + rect.w &&
          y >= rect.y &&
          y <= rect.y + rect.h
        ) {
          return { row: row, col: g.startCol, region: "tile" };
        }
      }
    }
    return null;
  }

  // ---------- Narrative dice rich-text rendering ----------
  function ttSymbolMap() {
    return {
      ability: {
        char: "d",
        font: "EotE Symbol",
        fill: "#46ac4e",
        stroke: "#000000",
      },
      difficulty: {
        char: "d",
        font: "EotE Symbol",
        fill: "#52287e",
        stroke: "#000000",
      },
      proficiency: {
        char: "c",
        font: "EotE Symbol",
        fill: "#fef035",
        stroke: "#000000",
      },
      challenge: {
        char: "c",
        font: "EotE Symbol",
        fill: "#751317",
        stroke: "#000000",
      },
      boost: {
        char: "b",
        font: "EotE Symbol",
        fill: "#76cddb",
        stroke: "#000000",
      },
      setback: {
        char: "b",
        font: "EotE Symbol",
        fill: "#000000",
        stroke: "#888888",
      },
      magic: {
        char: "c",
        font: "EotE Symbol",
        fill: "#ffffff",
        stroke: "#000000",
      },
      force: {
        char: "c",
        font: "EotE Symbol",
        fill: "#ffffff",
        stroke: "#000000",
      },
      success: { char: "s", font: "EotE Symbol", fill: null },
      advantage: { char: "a", font: "EotE Symbol", fill: null },
      failure: { char: "f", font: "EotE Symbol", fill: null },
      threat: { char: "t", font: "EotE Symbol", fill: null },
      triumph: { char: "x", font: "EotE Symbol", fill: null },
      despair: { char: "y", font: "EotE Symbol", fill: null },
      light: { char: "Z", font: "EotE Symbol", fill: null },
      dark: { char: "z", font: "EotE Symbol", fill: null },
      forcepoint: { char: "Y", font: "EotE Symbol", fill: null },
    };
  }

  function ttParseRichText(html) {
    if (!html) return [];
    const out = [];
    const spanRe =
      /<span[^>]*data-dice-type=["']([^"']+)["'][^>]*>[\s\S]*?<\/span>/gi;
    let last = 0;
    let m;
    while ((m = spanRe.exec(html)) !== null) {
      if (m.index > last) {
        const txt = ttStripHtml(html.slice(last, m.index));
        if (txt) out.push({ type: "text", text: txt });
      }
      out.push({ type: "symbol", kind: m[1].toLowerCase() });
      last = m.index + m[0].length;
    }
    if (last < html.length) {
      const txt = ttStripHtml(html.slice(last));
      if (txt) out.push({ type: "text", text: txt });
    }
    return out;
  }

  function ttRenderRichText(
    c,
    tokens,
    x,
    y,
    maxW,
    lineH,
    maxLines,
    color,
    basePxFont,
    dry,
  ) {
    const sym = ttSymbolMap();
    const px = parseInt(basePxFont, 10) || 12;
    const symFontStr = (def) => px + "px '" + def.font + "'";
    const items = [];
    for (let i = 0; i < tokens.length; i++) {
      const t = tokens[i];
      if (t.type === "text") {
        const parts = t.text.split(/(\s+)/);
        for (let j = 0; j < parts.length; j++) {
          const p = parts[j];
          if (!p) continue;
          if (/^\s+$/.test(p)) items.push({ kind: "space" });
          else items.push({ kind: "word", text: p });
        }
      } else if (t.type === "symbol") {
        items.push({ kind: "symbol", which: t.kind });
      }
    }
    let curX = x;
    let curY = y;
    let line = 1;
    let firstOnLine = true;
    c.setTextAlign("left");
    c.setTextBaseline("top");
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      let itW = 0;
      if (it.kind === "word") {
        c.setFont(basePxFont);
        itW = c.measureText(it.text).width;
      } else if (it.kind === "space") {
        c.setFont(basePxFont);
        itW = c.measureText(" ").width;
      } else if (it.kind === "symbol") {
        const def = sym[it.which];
        if (!def) continue;
        c.setFont(symFontStr(def));
        itW = c.measureText(def.char).width + 2;
      }
      if (it.kind === "space" && firstOnLine) continue;
      if (curX + itW > x + maxW && !firstOnLine) {
        curX = x;
        curY += lineH;
        line++;
        if (line > maxLines) return maxLines;
        firstOnLine = true;
        if (it.kind === "space") continue;
      }
      if (!dry) {
        if (it.kind === "word") {
          c.setFont(basePxFont);
          c.setFillStyle(color);
          c.fillText(it.text, curX, curY);
        } else if (it.kind === "symbol") {
          const def = sym[it.which];
          if (def) {
            c.setFont(symFontStr(def));
            if (def.stroke) {
              c.setStrokeStyle(def.stroke);
              c.setLineWidth(1.5);
              c.strokeText(def.char, curX + 1, curY);
            }
            c.setFillStyle(def.fill || color);
            c.fillText(def.char, curX + 1, curY);
          }
        }
      }
      curX += itW;
      firstOnLine = false;
    }
    return line;
  }

  function ttTheme() {
    return {
      bg: api.getThemeColor("background"),
      surface: api.getThemeColor("surface"),
      border: api.getThemeColor("border"),
      primary: api.getThemeColor("primary"),
      primaryLight: api.getThemeColor("primaryLight"),
      primaryContrast: api.getThemeColor("primaryContrast"),
      text: api.getThemeColor("text"),
      textDim: api.getThemeColor("textDim"),
    };
  }

  function ttDrawConnectors(c, fp, lay, theme) {
    c.setStrokeStyle(theme.primary);
    c.setLineWidth(3);
    c.setLineCap("round");

    // connector1_C: DOWN from banner bottom to top of row 1 tile (col C).
    for (let col = 1; col <= 4; col++) {
      if (fp.data?.[`connector1_${col}`] !== "Yes") continue;
      const t = ttTileRect(1, col, lay);
      const x = t.x + t.w / 2;
      c.beginPath();
      c.moveTo(x, lay.bannerY + lay.BANNER_H);
      c.lineTo(x, t.y);
      c.stroke();
    }

    // connector{R}_C for R=2..4: vertical from row R-1 col C bottom to row R col C top.
    for (let row = 2; row <= 4; row++) {
      for (let col = 1; col <= 4; col++) {
        if (fp.data?.[`connector${row}_${col}`] !== "Yes") continue;
        const top = ttTileRect(row - 1, col, lay);
        const bot = ttTileRect(row, col, lay);
        const x = top.x + top.w / 2;
        c.beginPath();
        c.moveTo(x, top.y + top.h);
        c.lineTo(x, bot.y);
        c.stroke();
      }
    }

    // h_connector{R}_{C}: horizontal — only when col C isn't merged into col C-1.
    for (let row = 1; row <= 4; row++) {
      for (let col = 2; col <= 4; col++) {
        const isHidden = fp.data?.[`hide${row}_${col}`] === "Yes";
        if (isHidden) continue;
        if (fp.data?.[`h_connector${row}_${col}`] !== "Yes") continue;
        const left = ttTileRect(row, col - 1, lay);
        const right = ttTileRect(row, col, lay);
        const y = left.y + left.h / 2;
        c.beginPath();
        c.moveTo(left.x + left.w, y);
        c.lineTo(right.x, y);
        c.stroke();
      }
    }
  }

  function ttDrawBanner(c, fp, lay, theme) {
    const x = lay.PAD;
    const y = lay.bannerY;
    const w = lay.W - 2 * lay.PAD;
    const h = lay.BANNER_H;

    c.setFillStyle(theme.surface);
    c.fillRect(x, y, w, h);
    c.setStrokeStyle(theme.primary);
    c.setLineWidth(2);
    c.strokeRect(x + 1, y + 1, w - 2, h - 2);

    const pSize = Math.max(0, h - 14);
    const pX = x + 8;
    const pY = y + (h - pSize) / 2;
    if (fp?.portrait) {
      c.drawImage(fp.portrait, pX, pY, pSize, pSize);
    } else {
      c.setFillStyle(theme.border);
      c.beginPath();
      c.arc(pX + pSize / 2, pY + pSize / 2, pSize / 2, 0, Math.PI * 2);
      c.fill();
      const name0 = fp?.name || "?";
      c.setFillStyle(theme.text);
      c.setFont("bold 18px sans-serif");
      c.setTextAlign("center");
      c.setTextBaseline("middle");
      c.fillText(
        name0.charAt(0).toUpperCase(),
        pX + pSize / 2,
        pY + pSize / 2 + 1,
      );
    }

    const name = fp?.name || "Force Power";
    const cost = fp?.data?.cost != null ? fp.data.cost : null;
    const textX = pX + pSize + 12;
    const textMaxW = x + w - textX - 8;

    c.setTextAlign("left");
    c.setTextBaseline("middle");

    if (cost != null) {
      c.setFillStyle(theme.text);
      c.setFont("bold 16px sans-serif");
      c.fillText(ttTruncate(c, name, textMaxW), textX, y + h / 2 - 10);
      c.setFillStyle(theme.textDim);
      c.setFont("italic 11px sans-serif");
      c.fillText("Base cost: " + cost + " XP", textX, y + h / 2 + 12);
    } else {
      c.setFillStyle(theme.text);
      c.setFont("bold 16px sans-serif");
      c.fillText(ttTruncate(c, name, textMaxW), textX, y + h / 2);
    }
  }

  // Draw a single tile (or merged group). `rect` is the full bounding box
  // (one column wide for normal tiles, multi-column wide for merged groups).
  function ttDrawTile(c, rect, talent, chosen, rank, theme) {
    if (chosen) {
      c.setFillStyle(theme.primary);
      c.fillRect(rect.x, rect.y, rect.w, rect.h);
    } else if (talent) {
      c.setFillStyle(theme.surface);
      c.fillRect(rect.x, rect.y, rect.w, rect.h);
    }

    if (chosen) {
      c.setStrokeStyle(theme.primary);
      c.setLineWidth(1);
    } else {
      c.setStrokeStyle(theme.border);
      c.setLineWidth(1);
    }
    c.strokeRect(rect.x + 0.5, rect.y + 0.5, rect.w - 1, rect.h - 1);

    if (!talent) {
      c.setFillStyle(theme.textDim);
      c.setFont("11px sans-serif");
      c.setTextAlign("center");
      c.setTextBaseline("middle");
      c.fillText("(empty)", rect.x + rect.w / 2, rect.y + rect.h / 2);
      return;
    }

    const textColor = chosen ? theme.primaryContrast : theme.text;
    const dimColor = chosen ? theme.primaryContrast : theme.textDim;

    const pSize = 26;
    const pX = rect.x + 6;
    const pY = rect.y + 6;
    if (talent.portrait) {
      c.drawImage(talent.portrait, pX, pY, pSize, pSize);
    } else {
      c.setFillStyle(chosen ? theme.primaryContrast : theme.border);
      c.beginPath();
      c.arc(pX + pSize / 2, pY + pSize / 2, pSize / 2, 0, Math.PI * 2);
      c.fill();
      c.setFillStyle(chosen ? theme.primary : theme.text);
      c.setFont("bold 13px sans-serif");
      c.setTextAlign("center");
      c.setTextBaseline("middle");
      c.fillText(
        (talent.name || "?").charAt(0).toUpperCase(),
        pX + pSize / 2,
        pY + pSize / 2 + 1,
      );
    }

    const headerX = pX + pSize + 8;
    const headerRight = rect.x + rect.w - 30;

    c.setFillStyle(textColor);
    c.setFont("bold 13px sans-serif");
    c.setTextAlign("left");
    c.setTextBaseline("top");
    c.fillText(
      ttTruncate(c, talent.name || "Unnamed", headerRight - headerX),
      headerX,
      rect.y + 7,
    );

    const activation = talent.data?.activation || "Passive";
    const cost = talent.data?.cost != null ? talent.data.cost : "";
    const ranked = talent.data?.ranked === "yes";
    const sub = `${activation}${cost !== "" ? " · " + cost + " XP" : ""}${ranked ? " · Ranked" : ""}`;
    c.setFillStyle(dimColor);
    c.setFont("11px sans-serif");
    c.fillText(ttTruncate(c, sub, headerRight - headerX), headerX, rect.y + 24);

    const tokens = ttParseRichText(talent.data?.description || "");
    if (tokens.length) {
      ttRenderRichText(
        c,
        tokens,
        rect.x + 8,
        rect.y + 42,
        rect.w - 16,
        14,
        2,
        dimColor,
        "11px sans-serif",
        false,
      );
    }

    if (chosen && ranked && rank > 1) {
      c.setFillStyle(theme.primaryContrast);
      c.setFont("bold 11px sans-serif");
      c.setTextAlign("right");
      c.setTextBaseline("top");
      c.fillText("×" + rank, rect.x + rect.w - 32, rect.y + 8);
    }

    const cb = ttCheckboxRect(rect);
    if (chosen) {
      c.setFillStyle(theme.primaryContrast);
      c.fillRect(cb.x, cb.y, cb.w, cb.h);
    }
    c.setStrokeStyle(chosen ? theme.primary : theme.border);
    c.setLineWidth(1);
    c.strokeRect(cb.x + 0.5, cb.y + 0.5, cb.w - 1, cb.h - 1);
    if (chosen) {
      c.setStrokeStyle(theme.primary);
      c.setLineWidth(2);
      c.setLineCap("round");
      c.beginPath();
      c.moveTo(cb.x + 4, cb.y + 11);
      c.lineTo(cb.x + 9, cb.y + 15);
      c.lineTo(cb.x + 16, cb.y + 5);
      c.stroke();
    }
  }

  function ttDrawTooltip(c, talent, anchorRect, lay, theme) {
    const tipW = Math.min(360, lay.W - 20);
    const padX = 10;
    const padY = 8;
    const lineH = 16;
    const headerH = 18;
    const subH = 15;
    const tokens = ttParseRichText(talent.data?.description || "");
    const descMaxW = tipW - padX * 2;
    const MAX_DESC_LINES = 14;
    const descLineCount = tokens.length
      ? ttRenderRichText(
          c,
          tokens,
          0,
          0,
          descMaxW,
          lineH,
          MAX_DESC_LINES,
          "#000",
          "12px sans-serif",
          true,
        )
      : 0;
    const tipH = padY * 2 + headerH + subH + descLineCount * lineH;

    let tipX = anchorRect.x;
    let tipY = anchorRect.y + anchorRect.h + 6;
    if (tipY + tipH > lay.H - 4) tipY = anchorRect.y - tipH - 6;
    if (tipY < 4) tipY = 4;
    if (tipX + tipW > lay.W - 4) tipX = lay.W - tipW - 4;
    if (tipX < 4) tipX = 4;

    c.setShadowColor("rgba(0, 0, 0, 0.45)");
    c.setShadowBlur(12);
    c.setShadowOffsetX(0);
    c.setShadowOffsetY(2);
    c.setFillStyle(theme.surface);
    c.fillRect(tipX, tipY, tipW, tipH);
    c.setShadowBlur(0);
    c.setShadowOffsetY(0);

    c.setStrokeStyle(theme.primary);
    c.setLineWidth(1);
    c.strokeRect(tipX + 0.5, tipY + 0.5, tipW - 1, tipH - 1);

    let ty = tipY + padY;
    c.setTextAlign("left");
    c.setTextBaseline("top");

    c.setFillStyle(theme.text);
    c.setFont("bold 13px sans-serif");
    c.fillText(
      ttTruncate(c, talent.name || "Unnamed", tipW - padX * 2),
      tipX + padX,
      ty,
    );
    ty += headerH;

    const activation = talent.data?.activation || "Passive";
    const cost = talent.data?.cost != null ? talent.data.cost : "";
    const ranked = talent.data?.ranked === "yes" ? " · Ranked" : "";
    const sub = `${activation}${cost !== "" ? " · " + cost + " XP" : ""}${ranked}`;
    c.setFillStyle(theme.textDim);
    c.setFont("italic 11px sans-serif");
    c.fillText(sub, tipX + padX, ty);
    ty += subH;

    if (tokens.length) {
      ttRenderRichText(
        c,
        tokens,
        tipX + padX,
        ty,
        descMaxW,
        lineH,
        MAX_DESC_LINES,
        theme.text,
        "12px sans-serif",
        false,
      );
    }
  }

  function paintForceTree(explicitCharRec) {
    const c = getActiveCanvas();
    if (!c) return;
    const lay = ttLayout();
    if (!lay || lay.tileW <= 0 || lay.tileH <= 0) return;

    const ctx = getForceForCanvas();
    const fp = ctx.fp;
    if (!fp) return;

    let charRec = explicitCharRec;
    if (!charRec) {
      if (record?.recordType === "characters") {
        charRec = record;
      } else if (fp.data?.characterId) {
        api.getRecord("characters", fp.data.characterId, (cr) => {
          if (cr) {
            ttPreloadPortraitsThen(fp, () =>
              doPaintForceTree(c, lay, ctx, cr),
            );
          }
        });
        return;
      } else if (record?.recordType === "force_powers") {
        // Locked compendium view — no character. Paint the bare tree
        // (no chosen state); charRec stays undefined.
      } else {
        // No character resolvable — bail rather than clobber correct render.
        return;
      }
    }
    ttPreloadPortraitsThen(fp, () => doPaintForceTree(c, lay, ctx, charRec));
  }

  // Preload force-power banner + tile portraits via api.preloadImage so
  // c.drawImage stays sync (otherwise async portraits overlay the tooltip).
  // Honors merged cells — only the start-col slot of each row group has a
  // populated talent, so we walk groups instead of every (row,col).
  function ttPreloadPortraitsThen(fp, then) {
    if (typeof api.preloadImage !== "function") {
      then();
      return;
    }
    const urls = [];
    const seen = new Set();
    const add = (u) => {
      if (u && !seen.has(u)) {
        seen.add(u);
        urls.push(u);
      }
    };
    add(fp?.portrait);
    for (let r = 1; r <= 4; r++) {
      const groups = ttRowGroups(fp, r);
      for (const g of groups) {
        add(fp?.data?.[`talent${r}_${g.startCol}`]?.[0]?.portrait);
      }
    }
    if (!urls.length) {
      then();
      return;
    }
    Promise.all(urls.map((u) => api.preloadImage(u))).then(then, then);
  }

  function doPaintForceTree(c, lay, ctx, charRec) {
    const theme = ttTheme();
    const fp = ctx.fp;
    const fpPath = ctx.fpPath;

    if (
      charRec?.recordType === "characters" &&
      charRec._id &&
      fp.data?.characterId !== charRec._id
    ) {
      api.setValues({
        [`${fpPath ? fpPath + "." : ""}data.characterId`]: charRec._id,
      });
    }

    migrateLegacyForceChosenSlots(fp, fpPath, charRec);

    c.clearRect(0, 0, lay.W, lay.H);
    ttDrawConnectors(c, fp, lay, theme);
    ttDrawBanner(c, fp, lay, theme);

    // Per-row groups — merged cells render as one wider tile.
    for (let row = 1; row <= 4; row++) {
      const groups = ttRowGroups(fp, row);
      for (let i = 0; i < groups.length; i++) {
        const g = groups[i];
        const rect = ttGroupRect(row, g.startCol, g.endCol, lay);
        const slotKey = `talent${row}_${g.startCol}`;
        const talent = fp.data?.[slotKey]?.[0] || null;
        const chosen = !!talent && ttIsSlotChosen(fp, row, g.startCol);
        const rank = chosen ? ttChosenRank(talent, fp) : 0;
        ttDrawTile(c, rect, talent, chosen, rank, theme);
      }
    }

    // Tooltip drawn last; portraits preloaded so c.drawImage is sync and the
    // tooltip naturally lands on top.
    const hover = api.getSession("forceHover");
    if (hover) {
      const slotKey = `talent${hover.row}_${hover.col}`;
      const talent = fp.data?.[slotKey]?.[0];
      if (talent && (talent.name || talent.data?.description)) {
        const groups = ttRowGroups(fp, hover.row);
        const g = groups.find((gg) => gg.startCol === hover.col);
        if (g) {
          const rect = ttGroupRect(hover.row, g.startCol, g.endCol, lay);
          ttDrawTooltip(c, talent, rect, lay, theme);
        }
      }
    }
  }

  // Idempotent legacy migration. See specialization-main.html for full
  // rationale. Force powers are 4×4 with merged cells; chosen state is
  // attached to the START col of each merged group only (talent slots are
  // only populated at the start col).
  function migrateLegacyForceChosenSlots(fp, fpPath, charRec) {
    // Compendium view has no character — nothing to migrate, and we
    // must not stamp legacyChosenMigrated onto the master template.
    if (!charRec) return;
    if (fp?.data?.legacyChosenMigrated) return;
    const prefix = fpPath ? fpPath + "." : "";
    const talents = fp?.data?.talents || [];
    const updates = {};
    let touched = false;
    const slotsByTalentId = {};
    for (let r = 1; r <= 4; r++) {
      for (let col = 1; col <= 4; col++) {
        const t = fp.data?.[`talent${r}_${col}`]?.[0];
        if (!t?._id) continue;
        if (!slotsByTalentId[t._id]) slotsByTalentId[t._id] = [];
        slotsByTalentId[t._id].push({ row: r, col: col });
      }
    }
    for (const entry of talents) {
      if (!entry?._id) continue;
      const dashIdx = entry._id.indexOf("-");
      const isUnrankedEncoded =
        dashIdx > 0 && entry._id.slice(dashIdx + 1).includes("data.");
      if (isUnrankedEncoded) {
        const slotPathDot = entry._id.slice(dashIdx + 1);
        const m = slotPathDot.match(/data\.(talent\d+_\d+)\.0\.?$/);
        if (m && slotPathDot.startsWith(prefix + "data.")) {
          const slotKey = m[1];
          const slot = fp.data?.[slotKey]?.[0];
          if (slot && slot.data?.chosen !== "yes") {
            updates[`${prefix}data.${slotKey}.0.data.chosen`] = "yes";
            touched = true;
          }
        }
      } else {
        const occurrences = slotsByTalentId[entry._id] || [];
        const rank = entry?.data?.rank || 1;
        for (let i = 0; i < Math.min(rank, occurrences.length); i++) {
          const { row, col } = occurrences[i];
          const slot = fp.data?.[`talent${row}_${col}`]?.[0];
          if (slot && slot.data?.chosen !== "yes") {
            updates[`${prefix}data.talent${row}_${col}.0.data.chosen`] = "yes";
            touched = true;
          }
        }
      }
    }
    updates[`${prefix}data.legacyChosenMigrated`] = true;
    if (touched) {
      api.setValuesOnRecord(charRec, updates, (recUpd) =>
        paintForceTree(recUpd),
      );
    } else {
      api.setValuesOnRecord(charRec, {
        [`${prefix}data.legacyChosenMigrated`]: true,
      });
    }
  }

  function onCanvasMove() {
    const lay = ttLayout();
    if (!lay) return;
    const ctx = getForceForCanvas();
    const hit = ttHitTest(event.x, event.y, lay, ctx.fp);
    const prev = api.getSession("forceHover");
    const same =
      (!prev && !hit) ||
      (prev && hit && prev.row === hit.row && prev.col === hit.col);
    if (!same) {
      api.setSession("forceHover", hit);
      paintForceTree();
    }
  }

  function onCanvasLeave() {
    if (api.getSession("forceHover")) {
      api.setSession("forceHover", null);
      paintForceTree();
    }
  }

  function onCanvasClick() {
    // Only the character-sheet canvas is interactive — compendium-locked
    // view is read-only/visual.
    if (record?.recordType !== "characters") return;

    const lay = ttLayout();
    if (!lay) return;
    const ctx = getForceForCanvas();
    const fp = ctx.fp;
    const fpPath = ctx.fpPath;
    const hit = ttHitTest(event.x, event.y, lay, fp);
    if (!hit) return;

    const slotKey = `talent${hit.row}_${hit.col}`;
    const talent = fp.data?.[slotKey]?.[0];
    if (!talent) return;

    if (hit.region === "checkbox") {
      api.getRecord("characters", record._id, (charRec) => {
        if (!charRec) return;
        // Per-slot chosen state — paint reads slot.data.chosen, so the click
        // handler must too. Looking up by talent._id alone matches every slot
        // containing the same ranked talent.
        const isChosen = ttIsSlotChosen(fp, hit.row, hit.col);
        ttToggleChosen(hit.row, hit.col, isChosen ? "no" : "yes", charRec);
      });
    }
  }

  // Same per-slot model as specialization-main.html — write data.chosen on
  // the slot AND maintain the consolidated upgrades list at fp.data.talents
  // (not character.data.talents). Cost still updates character.data.spentXp.
  function ttToggleChosen(row, col, newValue, charRec) {
    const ctx = getForceForCanvas();
    const fp = ctx.fp;
    const fpPath = ctx.fpPath;
    const slotKey = `talent${row}_${col}`;
    const talent = fp.data?.[slotKey]?.[0];
    if (!talent) return;

    const fpPrefix = fpPath ? fpPath + "." : "";
    const slotPathDot = `${fpPrefix}data.${slotKey}.0.`;
    const slotChosenPath = `${fpPrefix}data.${slotKey}.0.data.chosen`;
    const fpTalentsPath = `${fpPrefix}data.talents`;
    const ranked = talent.data?.ranked === "yes";
    const id = ranked ? talent._id : `${talent._id}-${slotPathDot}`;

    const talents = fp.data?.talents || [];
    const idx = talents.findIndex((t) => t._id === id);
    const existing = talents[idx];
    const cost = talent.data?.cost || 0;

    if (newValue === "yes") {
      if (idx !== -1) {
        api.setValuesOnRecord(
          charRec,
          {
            [slotChosenPath]: "yes",
            [`${fpTalentsPath}.${idx}.data.rank`]:
              (existing?.data?.rank || 0) + 1,
          },
          (recUpd) => {
            const valuesToSet = {
              [`data.spentXp`]: (recUpd.data.spentXp || 0) + cost,
            };
            api.setValuesOnRecord(recUpd, valuesToSet, (recFinal) =>
              paintForceTree(recFinal || recUpd),
            );
          },
        );
      } else {
        const newTalents = [
          ...talents,
          {
            ...talent,
            _id: id,
            data: { ...talent.data, rank: 1 },
            icon: "IconStar",
          },
        ];
        api.setValuesOnRecord(
          charRec,
          { [slotChosenPath]: "yes", [fpTalentsPath]: newTalents },
          (recUpd) => {
            const valuesToSet = {
              [`data.spentXp`]: (recUpd.data.spentXp || 0) + cost,
            };
            api.setValuesOnRecord(recUpd, valuesToSet, (recFinal) =>
              paintForceTree(recFinal || recUpd),
            );
          },
        );
      }
    } else {
      if (idx !== -1 && existing?.data?.rank && existing.data.rank > 1) {
        api.setValuesOnRecord(
          charRec,
          {
            [slotChosenPath]: "no",
            [`${fpTalentsPath}.${idx}.data.rank`]: existing.data.rank - 1,
          },
          (recUpd) => {
            const valuesToSet = {
              [`data.spentXp`]: (recUpd.data.spentXp || 0) - cost,
            };
            api.setValuesOnRecord(recUpd, valuesToSet, (recFinal) =>
              paintForceTree(recFinal || recUpd),
            );
          },
        );
      } else if (idx !== -1) {
        const filtered = talents.filter((_, i) => i !== idx);
        api.setValuesOnRecord(
          charRec,
          { [slotChosenPath]: "no", [fpTalentsPath]: filtered },
          (recUpd) => {
            const valuesToSet = {
              [`data.spentXp`]: (recUpd.data.spentXp || 0) - cost,
            };
            api.setValuesOnRecord(recUpd, valuesToSet, (recFinal) =>
              paintForceTree(recFinal || recUpd),
            );
          },
        );
      } else {
        api.setValuesOnRecord(
          charRec,
          { [slotChosenPath]: "no" },
          (recUpd) => paintForceTree(recUpd),
        );
      }
    }
  }
</script>
